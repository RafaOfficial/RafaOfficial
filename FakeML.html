<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5b7cfa">

<title>Fake ML RafaXMods</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght=500;600;700;800&family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">

<style>
/* RESET & BASE THEME */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

h1,h2,.title-hero,.label,.btn,.status-text{
font-family:'Poppins',sans-serif;
}

body{
background:#05060d;
min-height:100vh;
color:#f4f6ff;
overflow-x:hidden;
padding:25px;
display:flex;
flex-direction:column;
align-items:center;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(ellipse 60% 40% at 50% 0%,rgba(91,124,250,.28),transparent 60%),
radial-gradient(ellipse 70% 45% at 15% 55%,rgba(60,80,200,.16),transparent 60%),
radial-gradient(ellipse 70% 45% at 85% 90%,rgba(91,124,250,.20),transparent 60%);
z-index:-1;
}

.circle1{
position:fixed;
width:380px;
height:380px;
border-radius:50%;
background:rgba(91,124,250,.18);
top:-120px;
left:-120px;
filter:blur(90px);
z-index:-1;
}

.circle2{
position:fixed;
width:420px;
height:420px;
border-radius:50%;
background:rgba(124,147,255,.16);
bottom:-150px;
right:-150px;
filter:blur(100px);
z-index:-1;
}

/* CONTAINER */
.container{
width:100%;
max-width:430px;
margin:auto;
padding:22px 0;
}

/* HEADER TOPBAR */
.header{
display:flex;
align-items:center;
gap:15px;
margin-bottom:30px;
width:100%;
}

.back-btn{
width:54px;
height:54px;
border-radius:16px;
background:linear-gradient(145deg,#1a2044,#0e1230);
border:1px solid rgba(124,147,255,.35);
box-shadow:0 0 20px rgba(91,124,250,.25), inset 0 1px 0 rgba(255,255,255,.05);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.3s;
text-decoration:none;
color:#f4f6ff;
font-weight:bold;
font-size:18px;
}

.back-btn:hover{
transform:translateY(-2px);
border-color:rgba(124,147,255,.6);
box-shadow:0 0 25px rgba(91,124,250,.4);
}

.header-title{
font-size:20px;
font-weight:700;
color:#f4f6ff;
letter-spacing:.2px;
}

/* GLASS CARD STYLING */
.card{
background:linear-gradient(160deg,#10142c,#0a0d1f);
border:1px solid rgba(255,255,255,.07);
border-radius:24px;
padding:24px 20px;
box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 10px 30px rgba(0,0,0,.3);
margin-bottom:25px;
text-align:center;
position:relative;
overflow:hidden;
}

.title-hero{
font-size:24px;
font-weight:700;
margin-bottom:8px;
background:linear-gradient(90deg,#5b7cfa,#a5b4ff);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
}

.desc-hero{
font-size:13.5px;
color:#8b93b8;
line-height:1.6;
margin-bottom:20px;
}

.label{
display:block;
text-align:left;
font-size:15px;
font-weight:600;
color:#f4f6ff;
margin-bottom:10px;
}

/* INPUT TEXT / FILE SYSTEM */
.input-field, .file-input-wrapper{
margin-bottom:18px;
width:100%;
}

.input{
width:100%;
height:54px;
background:#070a18;
border:1px solid rgba(124,147,255,.25);
border-radius:16px;
padding:0 18px;
font-size:15px;
color:#f4f6ff;
outline:none;
transition:.3s;
}

.input:focus{
border-color:rgba(124,147,255,.6);
box-shadow:0 0 15px rgba(91,124,250,.2);
}

.input::placeholder{
color:#525a7f;
}

/* CUSTOM FILE INPUT */
.file-label{
display:flex;
align-items:center;
justify-content:center;
width:100%;
height:54px;
background:#070a18;
border:1px dashed rgba(124,147,255,.4);
border-radius:16px;
cursor:pointer;
transition:.3s;
font-size:14.5px;
font-weight:500;
color:#8b93b8;
}

.file-label:hover{
border-color:rgba(124,147,255,.7);
color:#f4f6ff;
background:rgba(91,124,250,.04);
}

.file-input{
display:none;
}

/* BUTTON MANAGEMENT */
.btn{
width:100%;
height:54px;
border:none;
border-radius:16px;
font-size:15px;
font-weight:600;
color:white;
cursor:pointer;
transition:.3s;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.btn-primary{
background:linear-gradient(145deg,#5b7cfa,#324adf);
box-shadow:0 8px 24px rgba(91,124,250,.35);
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 12px 28px rgba(91,124,250,.5);
}

.btn-download{
background:linear-gradient(145deg,#22c55e,#15803d);
box-shadow:0 8px 24px rgba(34,197,94,.35);
margin-top:15px;
display:none;
}

.btn-download.show{
display:flex;
animation: pulseglow 2s infinite;
}

@keyframes pulseglow {
0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
70% { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}

.btn-download:hover{
transform:translateY(-2px);
box-shadow:0 12px 28px rgba(34,197,94,.5);
}

/* ANIMASI LOADING SHIMMER PREMIUM */
.card-premium-anim.processing::after {
content: "";
position: absolute;
top: 0; right: 0; bottom: 0; left: 0;
transform: translateX(-100%);
background: linear-gradient(90deg, transparent, rgba(91,124,250,0.15), transparent);
animation: shimmer 1.6s infinite;
}

@keyframes shimmer {
100% { transform: translateX(100%); }
}

/* STATE MESSAGING STATUS */
.status-text{
font-size:14px;
font-weight:600;
color:#8b93b8;
margin-top:12px;
text-align:center;
}

/* LOADER PROCESSING RING */
.loading-box{
display:none;
margin:20px 0;
}

.loading-box.active{
display:block;
}

.spinner{
width:44px;
height:44px;
border:4px solid rgba(91,124,250,.15);
border-top:4px solid #5b7cfa;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
box-shadow:0 0 15px rgba(91,124,250,.2);
}

@keyframes spin{
100%{ transform:rotate(360deg); }
}

/* OUTPUT RESULT CANVAS WITH PREMIUM ENTRY ANIMATION */
canvas{
width:100%;
max-width:100%;
height:auto;
border-radius:18px;
border:1px solid rgba(124,147,255,.3);
box-shadow:0 0 30px rgba(91,124,250,.2), 0 10px 30px rgba(0,0,0,.5);
display:none;
margin-top:15px;
animation: premiumShow 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes premiumShow {
from { opacity: 0; transform: scale(0.92) translateY(10px); }
to { opacity: 1; transform: scale(1) translateY(0); }
}

/* FOOTER SYSTEMS */
.footer{
margin-top:30px;
padding:20px 0;
text-align:center;
border-top:1px solid rgba(255,255,255,.07);
width:100%;
}

.footer-brand{
font-family:'Poppins',sans-serif;
font-size:16px;
font-weight:700;
color:#f4f6ff;
margin-bottom:6px;
}

.footer-text{
font-size:12.5px;
font-weight:500;
color:#8b93b8;
line-height:1.6;
}
</style>
</head>
<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="container">

<div class="header">
<a href="index.html" class="back-btn">🔙</a>
<div class="header-title">RafaXMods Tools</div>
</div>

<div class="card">
<h1 class="title-hero">Fake ML</h1>
<p class="desc-hero">Buat gambar profil Mobile Legends kustom unik buatanmu sendiri secara instan dan gratis ✨</p>

<div class="file-input-wrapper">
<label class="label">Pilih Gambar Dari Galeri</label>
<label for="imageFile" class="file-label" id="fileLabel">📁 Ketuk untuk upload gambar...</label>
<input type="file" id="imageFile" class="file-input" accept="image/*">
</div>

<div class="input-field">
<label class="label">Atau Pakai URL Gambar</label>
<input type="text" id="imageUrl" class="input" placeholder="https://example.com/image.png">
</div>

<button class="btn btn-primary" id="generateBtn">🚀 GENERATE PROFILE</button>
</div>

<div class="card card-premium-anim" id="resultCard" style="display:none;">
<label class="label" style="text-align:center; margin-bottom:15px;">Hasil Output Canvas:</label>

<canvas id="myCanvas"></canvas>

<div class="loading-box" id="loading">
<div class="spinner"></div>
</div>

<div class="status-text" id="status">Pilih gambar & klik tombol diatas</div>

<button class="btn btn-download" id="downloadBtn">⬇️ DOWNLOAD GAMBAR</button>
</div>

<div class="footer">
<div class="footer-brand">RafaXMods</div>
<div class="footer-text">
© 2026 RafaXMods — Dukung kami dengan join Saluran WhatsApp & Telegram
</div>
</div>

</div>

<script>
const imageFile = document.getElementById("imageFile");
const fileLabel = document.getElementById("fileLabel");
const imageUrl = document.getElementById("imageUrl");
const generateBtn = document.getElementById("generateBtn");
const canvas = document.getElementById("myCanvas");
const ctx = canvas.getContext("2d");
const loading = document.getElementById("loading");
const status = document.getElementById("status");
const downloadBtn = document.getElementById("downloadBtn");
const resultCard = document.getElementById("resultCard");

imageFile.onchange = () => {
if(imageFile.files.length > 0){
fileLabel.innerText = "✅ " + imageFile.files[0].name;
imageUrl.value = ""; 
} else {
fileLabel.innerText = "📁 Ketuk untuk upload gambar...";
}
};

imageUrl.oninput = () => {
if(imageUrl.value.trim() !== ""){
imageFile.value = "";
fileLabel.innerText = "📁 Ketuk untuk upload gambar...";
}
};

function loadImg(src){
return new Promise((resolve, reject) => {
let img = new Image();
img.crossOrigin = "anonymous";
img.onload = () => resolve(img);
img.onerror = () => reject(new Error("Gagal memuat gambar: " + src));
img.src = src;
});
}

function drawRounded(ctx, img, x, y, size, radius) {
ctx.save();
ctx.beginPath();
ctx.moveTo(x + radius, y);
ctx.lineTo(x + size - radius, y);
ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
ctx.lineTo(x + size, y + size - radius);
ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
ctx.lineTo(x + radius, y + size);
ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
ctx.lineTo(x, y + radius);
ctx.quadraticCurveTo(x, y, x + radius, y);
ctx.closePath();
ctx.clip();
ctx.drawImage(img, x, y, size, size);
ctx.restore();
}

generateBtn.onclick = async () => {
resultCard.style.display = "block";
resultCard.classList.add("processing"); // Tambah Animasi Shimmer Neon
const file = imageFile.files[0];
const url = imageUrl.value.trim();
let imgSrc = "";

if(file){
imgSrc = URL.createObjectURL(file);
}else if(url){
imgSrc = url;
}else {
alert("Masukkan gambar!");
resultCard.style.display = "none";
resultCard.classList.remove("processing");
return;
}

loading.classList.add("active");
canvas.style.display="none";
downloadBtn.classList.remove("show");
status.innerText = "Sedang membuat Fake ML...";

try{
let bgUrl = "https://uploader.zenzxz.dpdns.org/uploads/1775228325905.jpeg";
let borderUrl = "https://uploader.zenzxz.dpdns.org/uploads/1775232236060.png";

let [bg, user, border] = await Promise.all([
loadImg(bgUrl),
loadImg(imgSrc),
loadImg(borderUrl)
]);

canvas.width = bg.width;
canvas.height = bg.height;

/* BG */
ctx.drawImage(bg, 0, 0);

/* FOTO */
drawRounded(ctx, user, 235, 500, 236, 40);

/* BORDER */
ctx.drawImage(border, 195, 460, 320, 320);

/* HIDE LOADING & ANIMATION */
loading.classList.remove("active");
resultCard.classList.remove("processing");

/* SHOW RESULT */
canvas.style.display="block";
downloadBtn.classList.add("show");
status.innerText = "Fake ML berhasil dibuat ✅";

/* AUTO SCROLL */
setTimeout(()=>{
window.scrollTo({
top: document.body.scrollHeight,
behavior: "smooth"
});
}, 200);

}catch(err){
loading.classList.remove("active");
resultCard.classList.remove("processing");
status.innerText = "Gagal membuat Fake ML ❌";
alert("Terjadi kesalahan! Pastikan URL gambar benar dan mendukung CORS.");
console.error(err);
}
};

downloadBtn.onclick = () => {
let a = document.createElement("a");
a.href = canvas.toDataURL("image/jpeg", 0.9);
a.download = "fakeml_" + Date.now() + ".jpg";
document.body.appendChild(a);
a.click();
a.remove();
};
</script>

</body>
</html>
