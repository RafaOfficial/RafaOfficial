<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#05070d;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* BACKGROUND */

.bg{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.4;
    animation:gerak 8s infinite alternate;
}

.circle1{
    width:250px;
    height:250px;
    background:#0066ff;
    top:-50px;
    left:-50px;
}

.circle2{
    width:300px;
    height:300px;
    background:#001d6e;
    bottom:-80px;
    right:-80px;
}

@keyframes gerak{
    from{
        transform:translateY(0px) translateX(0px);
    }
    to{
        transform:translateY(30px) translateX(20px);
    }
}

/* CONTAINER */

.container{
    width:95%;
    max-width:520px;
    height:90vh;
    background:#0c111b;
    border:1px solid rgba(0,140,255,.2);
    border-radius:25px;
    overflow:hidden;
    backdrop-filter:blur(10px);
    box-shadow:
    0 0 20px rgba(0,119,255,.3),
    0 0 50px rgba(0,38,255,.2);
}

/* HEADER */

.header{
    padding:20px;
    text-align:center;
    font-size:23px;
    font-weight:bold;
    background:linear-gradient(
        90deg,
        #003cff,
        #00a2ff
    );
    letter-spacing:1px;
    box-shadow:0 2px 15px rgba(0,89,255,.4);
}

/* CHAT */

.chat-box{
    height:calc(100% - 140px);
    overflow-y:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

/* MESSAGE */

.msg{
    max-width:85%;
    padding:14px;
    border-radius:18px;
    animation:fade .3s ease;
    word-wrap:break-word;
    line-height:1.6;
}

.user{
    align-self:flex-end;
    background:linear-gradient(
        135deg,
        #008cff,
        #003cff
    );

.bot{
    align-self:flex-start;

<div class="bg">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
</div>

<div class="container">

    <div class="header">
        AI GEMINI CHAT
    </div>

    <div class="chat-box" id="chatBox">

        <div class="msg bot">
            Halo 👋<br><br>
            Selamat datang di AI Gemini Chat.
        </div>

    </div>

    <div class="input-area">

        <input
        type="text"
        id="question"
        placeholder="Tulis pesan..."
        onkeypress="if(event.key==='Enter') sendMessage()"
        >

        <button
        class="send-btn"
        onclick="sendMessage()">
        Kirim
        </button>

    </div>

</div>

<script>

const chatBox = document.getElementById("chatBox");

/* TAMBAH PESAN */

function addMessage(text,type){

    const div = document.createElement("div");

    div.className = `msg ${type}`;

    // PESAN BOT
    if(type === "bot"){

        div.innerHTML = `
        <div class="ai-message">

            <div class="ai-text">
                ${text}
            </div>

            <button
            class="copy-ai-btn"
            onclick="copyAI(this)"
            data-text="${text.replace(/"/g,'&quot;')}">
            📋 Copy
            </button>

        </div>
        `;

    }else{

        div.innerHTML = text;

    }

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
}

/* KIRIM PESAN */

async function sendMessage(){

    const input = document.getElementById("question");

    const text = input.value.trim();

    // WAJIB ISI
    if(!text){

        alert("Tulis pesan terlebih dahulu!");

        input.focus();

        return;

    }

    addMessage(text,"user");

    input.value = "";

    // LOADING

    const loading = document.createElement("div");

    loading.className = "msg bot";

    loading.id = "loading";

    loading.innerHTML = `
    <div class="loading">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    `;

    chatBox.appendChild(loading);

    chatBox.scrollTop = chatBox.scrollHeight;

    try{

        // API FIX
        const response = await fetch(
            `https://api.soonex.biz.id/v1/ai/gemini?text=${encodeURIComponent(text)}`
        );

        const data = await response.json();

        document.getElementById("loading").remove();

        let hasil =
        data.result ||
        data.answer ||
        data.message ||
        data.response ||
        JSON.stringify(data);

        addMessage(hasil,"bot");

    }catch(err){

        document.getElementById("loading").remove();

        addMessage(
            "❌ Gagal mengambil respon AI.",
            "bot"
        );

        console.log(err);

    }

}

/* COPY AI */

function copyAI(button){

    const text = button.getAttribute("data-text");

    navigator.clipboard.writeText(text);

    button.innerHTML = "✅ Copied";

    setTimeout(()=>{

        button.innerHTML = "📋 Copy";

    },2000);

}

</script>

</body>

<script>

let hasil = "";

/* FILE NAME */

document
.getElementById("file")
.addEventListener("change", function(){

    const file =
    this.files[0];

    const text =
    document.querySelector("#fileText span");

    if(file){

        text.innerText =
        file.name;

    }else{

        text.innerText =
        "Upload File .JS";

    }

});

/* ENCRYPT */

async function encrypt(){

    try{

        const file =
        document.getElementById("file").files[0];

        const key =
        document.getElementById("key").value;

        if(!file){

            return alert("❌ Upload file JS dulu");

        }

        if(!key.includes("|")){

            return alert("❌ Format wajib text1|text2");

        }

        const [text1,text2] =
        key.split("|");

        const reader =
        new FileReader();

        const out =
        document.getElementById("out");

        out.innerHTML = `

        <div class="loading-wrap">

            <div class="loader"></div>

            <div class="loading-text">

                ⚡ Sedang Encrypt File...

            </div>

        </div>

        `;

        out.scrollIntoView({
            behavior:"smooth"
        });

        reader.onload =
        async function(e){

            try{

                const code =
                e.target.result;

                await new Promise(resolve =>
                    setTimeout(resolve,1500)
                );

                const obfuscated =
                JavaScriptObfuscator.obfuscate(code,{

                    compact:true,

                    controlFlowFlattening:true,

                    deadCodeInjection:true,

                    stringArrayEncoding:['base64'],

                    identifierNamesGenerator:'mangled',

                    renameGlobals:true,

                    identifiersPrefix:
                    `高宝座${text1}齐${text2}高宝座`

                });

                hasil =
                obfuscated.getObfuscatedCode();

                out.innerText =
                hasil.substring(0,1200) + "...";

                setTimeout(()=>{

                    out.scrollIntoView({
                        behavior:"smooth",
                        block:"center"
                    });

                },300);

            }catch(err){

                alert("❌ Encrypt Error : " + err.message);

            }

        };

        reader.readAsText(file);

    }catch(err){

        alert("❌ Error : " + err.message);

    }

}

/* DOWNLOAD */

function download(){

    if(!hasil){

        return alert("❌ Belum ada hasil encrypt");

    }

    const blob =
    new Blob([hasil],{
        type:"application/javascript"
    });

    const a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "encrypted.js";

    a.click();

}

</script>

<script>

async function generateImage(){

    const profile = document.getElementById("profile").value.trim();
    const nama = document.getElementById("nama").value.trim();
    const peserta = document.getElementById("peserta").value.trim();

    const loadingBox = document.getElementById("loadingBox");
    const loadingText = document.getElementById("loadingText");
    const loadingProgress = document.getElementById("loadingProgress");

    const result = document.getElementById("result");
    const hasil = document.getElementById("hasil");
    const download = document.getElementById("download");

    if(!profile || !nama || !peserta){

        alert("Harap isi semua form!");

        return;
    }

    loadingBox.style.display = "block";
    result.style.display = "none";

    let percent = 0;

    const interval = setInterval(() => {

        percent++;

        loadingText.innerHTML =
        `Loading ${percent}%`;

        loadingProgress.style.width =
        percent + "%";

        if(percent >= 100){

            clearInterval(interval);

            const api =
            `https://api.azbry.com/api/maker/igc?profile=${encodeURIComponent(profile)}&nama=${encodeURIComponent(nama)}&peserta=${encodeURIComponent(peserta)}`;

            hasil.src = api;

            hasil.onload = () => {

                loadingBox.style.display = "none";

                result.style.display = "block";

                download.href = api;

                /* AUTO SCROLL */

                result.scrollIntoView({
                    behavior:"smooth"
                });

            }

            hasil.onerror = () => {

                loadingBox.style.display = "none";

                alert("Gagal membuat gambar!");

            }

        }

    },20);

}
