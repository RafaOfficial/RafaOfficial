<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IQC GENERATOR - RafaXMods</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<meta name="theme-color" content="#6d4c41">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka',sans-serif;
scroll-behavior:smooth;
}

/* BODY */

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#2b1811,
#4e342e,
#6d4c41,
#3e2723
);

overflow-x:hidden;
color:white;
padding:20px;
}

/* BACKGROUND */

body::before{
content:'';
position:fixed;
inset:0;

background:
radial-gradient(circle at top,#ffccaa33,transparent 35%),
radial-gradient(circle at bottom,#ffd7b833,transparent 35%);

z-index:-1;
}

/* FLOAT EFFECT */

.circle1{
position:fixed;
width:350px;
height:350px;
border-radius:50%;
background:#ffffff10;
top:-120px;
left:-120px;
filter:blur(70px);
z-index:-1;
}

.circle2{
position:fixed;
width:400px;
height:400px;
border-radius:50%;
background:#ffb74d20;
bottom:-150px;
right:-150px;
filter:blur(80px);
z-index:-1;
}

/* TOP AREA */

.top-nav{
display:flex;
align-items:center;
margin-bottom:20px;
}

/* BACK BUTTON */

.back-btn{

width:50px;
height:50px;

display:flex;
justify-content:center;
align-items:center;

text-decoration:none;

border:none;
border-radius:18px;

background:
linear-gradient(
145deg,
#ffb74d,
#ff7043
);

border:
3px solid white;

box-shadow:
6px 6px 0px #bf360c;

color:white;

font-size:22px;
cursor:pointer;

transition:0.3s;
}

.back-btn:hover{

transform:
translateY(-5px)
rotate(-5deg);

}

/* CONTAINER */

.container{

max-width:550px;
margin:auto;

background:
linear-gradient(
145deg,
#8d6e63,
#6d4c41,
#4e342e
);

padding:25px;

border-radius:35px;

border:
4px solid white;

box-shadow:
10px 10px 0px #2d1b12;

position:relative;
overflow:hidden;
}

/* TITLE */

.title{
font-size:35px;
font-weight:700;
text-align:center;

text-shadow:
4px 4px 0px #3e2723;

margin-bottom:12px;
}

/* DESC */

.desc{
text-align:center;
color:#fff3e0;
font-size:15px;
line-height:1.7;
margin-bottom:25px;
}

/* INPUT */

.input-box{
margin-top:15px;
}

label{
display:block;
margin-bottom:10px;
font-size:15px;
font-weight:bold;
}

/* TEXTAREA */

textarea{

width:100%;
height:140px;

padding:18px;

border:none;
outline:none;

border-radius:24px;

background:
linear-gradient(
145deg,
#3e2723,
#2d1b12
);

border:
3px solid white;

box-shadow:
6px 6px 0px #1b0f0a;

color:white;

font-size:16px;

resize:none;
}

/* BUTTON */

button{

width:100%;

margin-top:20px;

padding:16px;

border:none;

border-radius:24px;

background:
linear-gradient(
145deg,
#ffb74d,
#ff7043
);

border:
3px solid white;

box-shadow:
7px 7px 0px #bf360c;

color:white;

font-size:17px;
font-weight:bold;

cursor:pointer;

transition:0.3s;
}

/* HOVER */

button:hover{

transform:
translateY(-5px)
rotate(-1deg);

}

/* DOWNLOAD BUTTON */

.download-btn{

background:
linear-gradient(
145deg,
#81c784,
#43a047
);

box-shadow:
7px 7px 0px #1b5e20;

display:none;
}

/* RESULT */

.result-box{
margin-top:30px;
display:none;
animation:fade 0.5s ease;
}

/* IMAGE */

.result-box img{

width:100%;

border-radius:28px;

border:
4px solid white;

box-shadow:
8px 8px 0px #2d1b12;
}

/* LOADING */

.loading{
display:none;
margin-top:25px;
text-align:center;
font-weight:bold;
color:#fff3e0;
font-size:16px;
}

/* FOOTER */

.footer{
margin-top:25px;
text-align:center;
font-size:14px;
font-weight:bold;

text-shadow:
3px 3px 0px #3e2723;
}

/* ANIMATION */

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:600px){

.title{
font-size:28px;
}

.container{
padding:20px;
}

}

</style>
</head>

<body>

<div class="circle1"></div>
<div class="circle2"></div>

<!-- TOP NAV -->

<div class="top-nav">

<a href="index.html" class="back-btn">
🔙
</a>

</div>

<!-- CONTAINER -->

<div class="container">

<!-- TITLE -->

<div class="title">
📸 IQC GENERATOR
</div>

<div class="desc">
Buat fake iPhone quote aesthetic.
</div>

<!-- INPUT -->

<div class="input-box">

<label>✏️ Masukkan Text</label>

<textarea
id="text"
placeholder="Contoh : Halo Dek"
></textarea>

</div>

<!-- BUTTON -->

<button onclick="generateIQC()">
🚀 Generate Sekarang
</button>

<!-- LOADING -->

<div class="loading" id="loading">
⏳ Sedang membuat gambar...
</div>

<!-- RESULT -->

<div
class="result-box"
id="resultBox"
>

<img id="resultImage">

<!-- DOWNLOAD -->

<button
class="download-btn"
id="downloadBtn"
onclick="downloadImage()"
>
⬇️ Download Image
</button>

</div>

<!-- FOOTER -->

<div class="footer">
© 2026 RafaXMods - IQC Generator
</div>

</div>

<script>

let imageUrl = "";

/* GENERATE */

async function generateIQC(){

const text =
document.getElementById("text").value;

if(!text){

alert("Masukkan text dulu!");
return;

}

/* SHOW LOADING */

document.getElementById("loading").style.display = "block";

document.getElementById("resultBox").style.display = "none";

document.getElementById("downloadBtn").style.display = "none";

try{

imageUrl =
`https://api.azbry.com/api/maker/iqc?text=${encodeURIComponent(text)}`;

/* SET IMAGE */

document.getElementById("resultImage").src = imageUrl;

/* WHEN IMAGE LOADED */

document.getElementById("resultImage").onload = () => {

/* HIDE LOADING */

document.getElementById("loading").style.display = "none";

/* SHOW RESULT */

document.getElementById("resultBox").style.display = "block";

/* SHOW DOWNLOAD */

document.getElementById("downloadBtn").style.display = "block";

/* AUTO SCROLL */

document
.getElementById("resultBox")
.scrollIntoView({
behavior:"smooth"
});

};

}catch(err){

document.getElementById("loading").style.display = "none";

alert("Terjadi kesalahan!");

}

}

/* DOWNLOAD IMAGE */

async function downloadImage(){

try{

const response =
await fetch(imageUrl);

const blob =
await response.blob();

const url =
window.URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download = "RafaXMods-IQC.png";

document.body.appendChild(a);

a.click();

a.remove();

window.URL.revokeObjectURL(url);

}catch(err){

alert("Gagal download image!");

}

}

</script>

</body>
</html>
