<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#5b7cfa">
<title>Fake Grup iPhone - RafaXMods</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght=500;600;700;800&family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">

<style>
/* RESET & BASE THEME */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

h1,h2,.title-hero,.label,.btn,.back-button,.progress-text{
    font-family:'Poppins',sans-serif;
}

body{
    background:#05060d;
    min-height:100vh;
    color:#f4f6ff;
    overflow-x:hidden;
    padding:22px;
}

/* BACKGROUND NEON GLOW */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(ellipse 60% 40% at 50% 0%,rgba(91,124,250,.28),transparent 60%),
    radial-gradient(ellipse 70% 45% at 15% 55%,rgba(60,80,200,.16),transparent 60%),
    radial-gradient(ellipse 70% 45% at 85% 90%,rgba(91,124,250,.20),transparent 60%);
    z-index:-1;
}

/* CONTAINER SETUP */
.container{
    max-width:430px;
    margin:auto;
}

/* HEADER TOPBAR */
.header{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:30px;
    width:100%;
}

.back-btn-top{
    width:54px;
    height:54px;
    border-radius:16px;
    background:linear-gradient(145deg,#1a2044,#0e1230);
    border:1px solid rgba(124,147,255,.35);
    box-shadow:0 0 20px rgba(91,124,250,.25), inset 0 1px 0 rgba(255,255,255,.05);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.3s;
    text-decoration:none;
    color:#f4f6ff;
    font-weight:bold;
    font-size:18px;
}

.back-btn-top:hover{
    transform:translateY(-2px);
    border-color:rgba(124,147,255,.6);
    box-shadow:0 0 25px rgba(91,124,250,.4);
}

.header-title{
    font-size:20px;
    font-weight:700;
    color:#f4f6ff;
    letter-spacing:.2px;
}

/* GLASS CARD PREMIUM STYLING */
.card{
    background:linear-gradient(160deg,#10142c,#0a0d1f);
    border:1px solid rgba(255,255,255,.07);
    border-radius:24px;
    padding:24px 20px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 10px 30px rgba(0,0,0,.3);
    margin-bottom:22px;
}

.title-hero{
    font-size:24px;
    font-weight:700;
    margin-bottom:8px;
    text-align:center;
    background:linear-gradient(90deg,#5b7cfa,#a5b4ff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}

.desc-hero{
    font-size:13.5px;
    color:#8b93b8;
    line-height:1.6;
    margin-bottom:20px;
    text-align:center;
}

.label{
    display:block;
    text-align:left;
    font-size:15px;
    font-weight:600;
    color:#f4f6ff;
    margin-bottom:10px;
}

/* INPUT COMPONENTS */
.input{
    width:100%;
    height:54px;
    background:#070a18;
    border:1px solid rgba(124,147,255,.25);
    border-radius:16px;
    padding:0 18px;
    font-size:15px;
    color:#f4f6ff;
    outline:none;
    transition:.3s;
    margin-bottom:18px;
}

.input:focus{
    border-color:rgba(124,147,255,.6);
    box-shadow:0 0 15px rgba(91,124,250,.2);
}

.input::placeholder{
    color:#525a7f;
}

/* BUTTON MANAGEMENT */
.btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:16px;
    font-size:15px;
    font-weight:600;
    color:white;
    cursor:pointer;
    transition:.3s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    text-decoration:none;
}

.btn-primary{
    background:linear-gradient(145deg,#5b7cfa,#324adf);
    box-shadow:0 8px 24px rgba(91,124,250,.35);
}

.btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 28px rgba(91,124,250,.5);
}

.btn-download{
    background:linear-gradient(145deg,#22c55e,#15803d);
    box-shadow:0 8px 24px rgba(34,197,94,.35);
    margin-top:15px;
}

.btn-download:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 28px rgba(34,197,94,.5);
}

/* BACK BUTTON BOTTOM (Sesuai Struktur Asli) */
.back-button{
    width:100%;
    margin-top:16px;
    height:54px;
    border:none;
    border-radius:16px;
    background:linear-gradient(145deg,#1a2044,#0e1230);
    border:1px solid rgba(124,147,255,.25);
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    display:flex;
    align-items:center;
    justify-content:center;
}

.back-button:hover{
    background:rgba(91,124,250,.1);
    border-color:rgba(124,147,255,.5);
}

/* LOADING BOX & PROGRESS TRACK SYSTEM */
.loading-box{
    display:none;
    text-align:center;
    padding:10px 0;
}

.progress-text{
    font-size:15px;
    font-weight:600;
    color:#a5b4ff;
    margin-bottom:12px;
}

.progress-bg{
    width:100%;
    height:10px;
    background:#070a18;
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.05);
}

.progress-bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#5b7cfa,#a5b4ff);
    box-shadow:0 0 10px rgba(91,124,250,0.7);
    transition:width 0.05s ease;
}

/* OUTPUT RESULT SYSTEM */
.result-box{
    display:none;
    text-align:center;
    animation: fadeIn 0.4s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: none; }
}

.result-box img{
    width:100%;
    border-radius:18px;
    border:1px solid rgba(124,147,255,.3);
    box-shadow:0 0 30px rgba(91,124,250,.2), 0 10px 30px rgba(0,0,0,.5);
}

/* FOOTER CREDITS */
.credit{
    margin-top:30px;
    padding:20px 0;
    text-align:center;
    border-top:1px solid rgba(255,255,255,.07);
    font-size:12.5px;
    font-weight:500;
    color:#8b93b8;
    line-height:1.6;
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="container">

    <div class="header">
        <a href="index.html" class="back-btn-top">🔙</a>
        <div class="header-title">RafaXMods Tools</div>
    </div>

    <div class="card">
        <h1 class="title-hero">Fake Grup iPhone</h1>
        <p class="desc-hero">Buat tampilan tangkapan layar grup iPhone kustom sesuai keinginanmu secara instan ✨</p>

        <label class="label">URL Foto Profil Grup</label>
        <input type="text" id="profile" class="input" placeholder="https://link-gambar.com/foto.jpg">

        <label class="label">Nama Grup</label>
        <input type="text" id="nama" class="input" placeholder="Ex: SQUAD RAFAXMODS">

        <label class="label">Jumlah Anggota / Peserta</label>
        <input type="number" id="peserta" class="input" placeholder="Ex: 535">

        <button class="btn btn-primary" onclick="generate()">🚀 GENERATE SEKARANG</button>
    </div>

    <div class="card loading-box" id="loadingBox">
        <div class="progress-text" id="loadingText">Loading 0%</div>
        <div class="progress-bg">
            <div class="progress-bar" id="loadingProgress"></div>
        </div>
    </div>

    <div class="card result-box" id="result">
        <label class="label" style="text-align:center; margin-bottom:15px;">Hasil Output Gambar:</label>
        <img id="hasil" src="" alt="Hasil Fake Grup">
        <a id="download" href="" download="fake-grup.png" class="btn btn-download">📥 DOWNLOAD GAMBAR</a>
    </div>

    <button class="back-button" onclick="location.href='index.html'">Kembali Ke Dashboard</button>

    <div class="credit">
        Rafa Official • Fake Grup Generator<br>
        © 2026 RafaXMods — Dukung kami dengan join Saluran WhatsApp & Telegram
    </div>

</div>

<script>
function generate(){
    const profile = document.getElementById("profile").value.trim();
    const nama = document.getElementById("nama").value.trim();
    const peserta = document.getElementById("peserta").value.trim();

    const loadingBox = document.getElementById("loadingBox");
    const loadingText = document.getElementById("loadingText");
    const loadingProgress = document.getElementById("loadingProgress");

    const result = document.getElementById("result");
    const hasil = document.getElementById("hasil");
    const download = document.getElementById("download");

    if(!profile || !nama || !peserta){
        alert("Harap isi semua form!");
        return;
    }

    loadingBox.style.display = "block";
    result.style.display = "none";

    let percent = 0;

    const interval = setInterval(() => {
        percent++;
        loadingText.innerHTML = `Loading ${percent}%`;
        loadingProgress.style.width = percent + "%";

        if(percent >= 100){
            clearInterval(interval);

            const api = `https://api.azbry.com/api/maker/igc?profile=${encodeURIComponent(profile)}&nama=${encodeURIComponent(nama)}&peserta=${encodeURIComponent(peserta)}`;

            hasil.src = api;

            hasil.onload = () => {
                loadingBox.style.display = "none";
                result.style.display = "block";
                download.href = api;

                /* AUTO SCROLL */
                result.scrollIntoView({
                    behavior:"smooth"
                });
            }

            hasil.onerror = () => {
                loadingBox.style.display = "none";
                alert("Gagal membuat gambar!");
            }
        }
    },20);
}
</script>

</body>
</html>
