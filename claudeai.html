<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5b7cfa">

<title>Claude AI - RafaXMods</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght=500;600;700;800&family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* RESET & BASE THEME */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

h1,h2,.header-title,.msg,.btn,.input{
font-family:'Poppins',sans-serif;
}

body {
background:#05060d;
height:100vh;
overflow:hidden;
color:#f4f6ff;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
}

/* BACKGROUND NEON GLOW EFFECTS */
.bg{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
background:
radial-gradient(ellipse 60% 40% at 50% 0%,rgba(91,124,250,.25),transparent 60%),
radial-gradient(ellipse 70% 45% at 15% 55%,rgba(60,80,200,.14),transparent 60%),
radial-gradient(ellipse 70% 45% at 85% 90%,rgba(91,124,250,.18),transparent 60%);
}

.blur{
position:absolute;
border-radius:50%;
filter:blur(95px);
opacity:0.3;
animation:gerak 8s infinite alternate;
}

.blur1{
width:350px;
height:350px;
background:rgba(91,124,250,.2);
top:-100px;
left:-100px;
}

.blur2{
width:380px;
height:380px;
background:rgba(124,147,255,.16);
bottom:-120px;
right:-120px;
}

@keyframes gerak{
from{ transform:translate(0,0) scale(1); }
to{ transform:translate(40px,20px) scale(1.1); }
}

/* CONTAINER ARCHITECTURE */
.container{
width:100%;
max-width:430px;
height:100%;
display:flex;
flex-direction:column;
padding:0 20px;
}

/* HEADER TOPBAR */
.header{
display:flex;
align-items:center;
gap:15px;
padding:24px 0 15px 0;
border-bottom:1px solid rgba(255,255,255,.07);
width:100%;
flex-shrink:0;
}

.back-btn{
width:48px;
height:48px;
border-radius:14px;
background:linear-gradient(145deg,#1a2044,#0e1230);
border:1px solid rgba(124,147,255,.35);
box-shadow:0 0 15px rgba(91,124,250,.2), inset 0 1px 0 rgba(255,255,255,.05);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.3s;
text-decoration:none;
color:#f4f6ff;
font-weight:bold;
font-size:16px;
}

.back-btn:hover{
transform:translateY(-2px);
border-color:rgba(124,147,255,.6);
box-shadow:0 0 20px rgba(91,124,250,.35);
}

.header-title{
font-size:20px;
font-weight:700;
background:linear-gradient(90deg,#5b7cfa,#a5b4ff);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
letter-spacing:.2px;
}

/* CHAT MESSAGING BOX AREA */
.chat-box{
flex:1;
overflow-y:auto;
padding:20px 0;
scroll-behavior:smooth;
}

.chat-box::-webkit-scrollbar{
width:4px;
}
.chat-box::-webkit-scrollbar-thumb{
background:rgba(91,124,250,0.3);
border-radius:10px;
}

/* CHAT BUBBLES PLATFORM */
.msg{
max-width:85%;
padding:14px 18px;
border-radius:20px;
font-size:14.5px;
line-height:1.6;
margin-bottom:25px;
position:relative;
animation:timbul 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
word-wrap:break-word;
}

@keyframes timbul{
from{ opacity:0; transform:translateY(12px) scale(0.97); }
to{ opacity:1; transform:none; }
}

.user{
background:linear-gradient(145deg,#5b7cfa,#324adf);
color:white;
margin-left:auto;
border-bottom-right-radius:4px;
box-shadow:0 6px 18px rgba(91,124,250,.25);
}

.bot{
background:linear-gradient(160deg,#10142c,#0a0d1f);
color:#f4f6ff;
margin-right:auto;
border-bottom-left-radius:4px;
border:1px solid rgba(255,255,255,.07);
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

/* ACTION COPY ICONS */
.copy-btn{
position:absolute;
right:12px;
bottom:-14px;
background:#161b3d;
border:1px solid rgba(124,147,255,.3);
color:#a5b4ff;
padding:5px 12px;
font-size:11px;
border-radius:8px;
cursor:pointer;
display:flex;
align-items:center;
gap:5px;
transition:0.2s ease;
z-index:10;
font-weight:600;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.copy-btn:hover{
background:#222b5c;
color:white;
border-color:rgba(124,147,255,.6);
transform: translateY(-1px);
}

/* LOADING RING ANIMATION */
.loading{
display:flex;
gap:6px;
padding:6px 0;
}

.dot{
width:9px;
height:9px;
background:#5b7cfa;
border-radius:50%;
animation:lompat 0.6s infinite alternate;
box-shadow:0 0 8px rgba(91,124,250,0.8);
}

.dot:nth-child(2){ animation-delay:0.2s; }
.dot:nth-child(3){ animation-delay:0.4s; }

@keyframes lompat{
from{ transform:translateY(0); }
to{ transform:translateY(-8px); }
}

/* BOTTOM TEXT INPUT BAR */
.input-box{
padding:15px 0 25px 0;
display:flex;
gap:12px;
background:#05060d;
width:100%;
align-items:center;
flex-shrink:0;
border-top:1px solid rgba(255,255,255,.04);
}

.input{
flex:1;
height:54px;
background:#070a18;
border:1px solid rgba(124,147,255,.25);
border-radius:16px;
padding:0 20px;
font-size:15px;
color:#f4f6ff;
outline:none;
transition:.3s;
}

.input:focus{
border-color:rgba(124,147,255,.6);
box-shadow:0 0 15px rgba(91,124,250,.2);
}

.input::placeholder{
color:#525a7f;
}

.btn{
width:54px;
height:54px;
background:linear-gradient(145deg,#5b7cfa,#324adf);
border:none;
border-radius:16px;
color:white;
font-size:18px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:.3s;
box-shadow:0 6px 18px rgba(91,124,250,.3);
flex-shrink:0;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 22px rgba(91,124,250,.45);
}

.btn:active{
transform:scale(0.95);
}
</style>
</head>
<body>

<div class="bg">
<div class="blur blur1"></div>
<div class="blur blur2"></div>
</div>

<div class="container">

<div class="header">
<a href="index.html" class="back-btn">🔙</a>
<div class="header-title">Claude AI Chat</div>
</div>

<div class="chat-box" id="chatBox">
<div class="msg bot">
<span>Halo! Saya Claude AI, asisten virtual pintar Anda di RafaXMods. Ada yang bisa saya bantu hari ini? ✨</span>
<button class="copy-btn" onclick="copyText('Halo! Saya Claude AI, asisten virtual pintar Anda di RafaXMods. Ada yang bisa saya bantu hari ini? ✨', this)"><i class="fa-regular fa-copy"></i> Salin</button>
</div>
</div>

<div class="input-box">
<input type="text" id="question" class="input" placeholder="Ketik pesan Anda disini..." onkeypress="if(event.key==='Enter') sendMessage()">
<button class="btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
</div>

</div>

<script>
const chatBox = document.getElementById("chatBox");

function addMessage(text, sender) {
const msg = document.createElement("div");
msg.className = `msg ${sender}`;

if (sender === "bot") {
const textSpan = document.createElement("span");
textSpan.innerText = text;
msg.appendChild(textSpan);

const btn = document.createElement("button");
btn.className = "copy-btn";
btn.innerHTML = `<i class="fa-regular fa-copy"></i> Salin`;
btn.onclick = () => copyText(text, btn);
msg.appendChild(btn);
} else {
msg.innerText = text;
}

chatBox.appendChild(msg);
chatBox.scrollTop = chatBox.scrollHeight;
}

/* ANTI-GAGAL ENGINE COPY PROCESS (With Textarea Fallback) */
function copyText(text, btn){
    if (navigator.clipboard && window.isSecureContext) {
        // Metode Utama menggunakan API Clipboard Modern
        navigator.clipboard.writeText(text).then(() => {
            handleCopySuccess(btn);
        }).catch(() => {
            fallbackCopyText(text, btn);
        });
    } else {
        // Metode Cadangan jika API Clipboard Dilarang / Tidak Didukung Perangkat
        fallbackCopyText(text, btn);
    }
}

/* FALLBACK METHOD */
function fallbackCopyText(text, btn) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    // Set style agar tidak terlihat/mengacaukan UI saat rendering
    textArea.style.position = "fixed";
    textArea.style.left = "-999999px";
    textArea.style.top = "-999999px";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    
    try {
        const successful = document.execCommand('copy');
        if(successful) {
            handleCopySuccess(btn);
        } else {
            alert("Gagal menyalin text.");
        }
    } catch (err) {
        alert("Browser tidak mendukung salin teks otomatis.");
    }
    document.body.removeChild(textArea);
}

/* SUCCESS VISUAL INDICATOR */
function handleCopySuccess(btn) {
    btn.innerHTML = `<i class="fa-solid fa-check"></i> Tersalin`;
    setTimeout(()=>{
        btn.innerHTML = `<i class="fa-regular fa-copy"></i> Salin`;
    }, 2000);
}

/* SEND MESSAGE SYSTEM */
async function sendMessage(){
const input = document.getElementById("question");
const text = input.value.trim();

if(!text) return;

/* USER CHAT BUBBLE */
addMessage(text, "user");
input.value = "";

/* LOADING ANIMATION RING */
const loading = document.createElement("div");
loading.className = "msg bot";
loading.id = "loading";
loading.innerHTML = `
<div class="loading">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
`;
chatBox.appendChild(loading);
chatBox.scrollTop = chatBox.scrollHeight;

try{
const response = await fetch(
"https://api.soonex.biz.id/v1/ai/claude?message=" + encodeURIComponent(text)
);
const data = await response.json();

/* REMOVE LOADING PROCESSOR */
const loadEl = document.getElementById("loading");
if(loadEl) loadEl.remove();

console.log(data);

/* RESULT RESPONSE PARSING */
let hasil =
data.result ||
data.answer ||
data.message ||
data.data ||
data.response ||
"Claude AI tidak memberikan respon.";

if(typeof hasil === "object"){
hasil = JSON.stringify(hasil, null, 2);
}

/* RENDER OUTPUT SHOW DATA */
addMessage(hasil, "bot");

}catch(err){
console.log(err);
const loadEl = document.getElementById("loading");
if(loadEl) loadEl.remove();
addMessage("Terjadi kesalahan saat mengambil respon AI.", "bot");
}
}
</script>

</body>
</html>
