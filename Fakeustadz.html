<script>
let imageURL = "";

function generateFake(){
const text = document.getElementById("question").value.trim();

if(!text){
alert("Masukkan pertanyaan terlebih dahulu");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("result").style.display="none";
document.getElementById("downloadBtn").style.display="none";

const api = `https://api.azbry.com/api/maker/tanyaustadz?text=${encodeURIComponent(text)}`;
const img = document.getElementById("preview");

img.onload = function(){
document.getElementById("loading").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("downloadBtn").style.display="block";
};

img.onerror = function(){
document.getElementById("loading").style.display="none";
alert("Gagal membuat gambar");
};

img.src = api;
imageURL = api;
}

async function downloadImage() {
if (!imageURL) return;

try {
const response = await fetch(imageURL);
const blob = await response.blob();
const url = window.URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = `fakeustadz-${Date.now()}.jpg`;
document.body.appendChild(a);
a.click();
a.remove();
window.URL.revokeObjectURL(url);
} catch (error) {
alert("Gagal mengunduh gambar, silakan coba lagi.");
}
}
