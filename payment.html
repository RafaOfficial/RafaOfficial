<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pembayaran TikTok</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
padding:15px;
}

.container{
max-width:430px;
margin:auto;
background:#1b1b1b;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,0,255,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#222;
padding:15px;
border-radius:15px;
margin-top:15px;
}

.center{
text-align:center;
}

.pp{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid #f107a3;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
background:linear-gradient(45deg,#7b2ff7,#f107a3);
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2a2a2a;
color:white;
margin-top:10px;
outline:none;
}

.status{
margin-top:10px;
padding:12px;
border-radius:12px;
font-weight:bold;
text-align:center;
}

.pending{
background:orange;
color:black;
}

.success{
background:lime;
color:black;
}

.cancel{
background:red;
color:white;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.loader{
width:70px;
height:70px;
border:6px solid #333;
border-top:6px solid #00ff99;
border-radius:50%;
animation:putar 1s linear infinite;
}

@keyframes putar{
100%{
transform:rotate(360deg);
}
}

.successPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.check{
width:100px;
height:100px;
border-radius:50%;
background:#00ff99;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
color:black;
font-weight:bold;
animation:zoom .4s;
}

@keyframes zoom{
0%{
transform:scale(0);
}
100%{
transform:scale(1);
}
}

img.bukti{
width:100%;
border-radius:12px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>💳 Pembayaran TikTok</h1>

<div class="card center">

<img id="pp" class="pp">

<h2 id="username"></h2>

<p id="paket"></p>

<p id="harga"></p>

</div>

<div class="card">

<h3>💰 Transfer Dana</h3>

<input type="text"
value="081234567890"
id="dana"
readonly>

<button onclick="copyDana()">
📋 Copy Nomor Dana
</button>

</div>

<div class="card">

<h3>📤 Upload Bukti TF</h3>

<input type="file"
id="bukti"
accept="image/*">

<button onclick="kirimBukti()">
🚀 Kirim Bukti Transfer
</button>

</div>

<div class="card">

<h3>📜 Riwayat Pemesanan</h3>

<div id="riwayat"></div>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDNWHQT0D16TMy9XQ0p0wYh42QwrvPFzaE",
authDomain: "reachchsystem-2d934.firebaseapp.com",
databaseURL: "https://reachchsystem-2d934-default-rtdb.asia-southeast1.firebasedatabase.app/",
projectId: "reachchsystem-2d934",
storageBucket: "reachchsystem-2d934.appspot.com",
messagingSenderId: "1020994564198",
appId: "1:1020994564198:web:1cf23aeb506ed136dc7da7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const data =
JSON.parse(localStorage.getItem('order_data'));

document.getElementById('pp').src =
data.pp;

document.getElementById('username').innerText =
'@' + data.username;

document.getElementById('paket').innerText =
'📦 Paket : ' + data.paket;

document.getElementById('harga').innerText =
'💰 Harga : Rp' + data.harga;

function copyDana(){

navigator.clipboard.writeText(
document.getElementById('dana').value
);

alert('Nomor Dana berhasil dicopy!');

}

async function kirimBukti(){

let file =
document.getElementById('bukti').files[0];

if(!file){
alert('Upload bukti transfer!');
return;
}

document.body.innerHTML += `
<div class="loading" id="loading">

<div class="loader"></div>

<p style="margin-top:20px;">
📤 Mengirim pesanan...
</p>

</div>
`;

try{

await db.ref('tiktok_orders').push({
username:data.username,
paket:data.paket,
harga:data.harga,
pp:data.pp,
status:'pending',
time:Date.now()
});

document.getElementById('loading')
.remove();

document.body.innerHTML += `
<div class="successPopup"
id="successPopup">

<div class="check">✓</div>

<p style="margin-top:20px;">
✅ Pesanan berhasil dikirim
</p>

</div>
`;

setTimeout(()=>{

window.open(
'https://wa.me/6285797837146?text=' +
encodeURIComponent(
'Halo admin saya sudah transfer\n\n' +
'Username: @${data.username}\n' +
'Paket: ${data.paket}\n' +
'Harga: Rp${data.harga}\n\n' +
'Saya akan kirim bukti TF.'
),
'_blank'
);

location.reload();

},2000);

}catch(err){

console.log(err);

if(document.getElementById('loading')){
document.getElementById('loading').remove();
}

alert('❌ Gagal mengirim pesanan');

}
}

function loadRiwayat(){

db.ref('tiktok_orders')
.on('value',snap=>{

let html='';

snap.forEach(data2=>{

let item = data2.val();

if(item.username === data.username){

html += `

<div class="card">

<center>
<img src="${item.pp}"
class="pp">
</center>

<h3 class="center">
@${item.username}
</h3>

<p>📦 Paket :
${item.paket}</p>

<p>💰 Harga :
Rp${item.harga}</p>

<div class="status ${
item.status == 'pending'
? 'pending'
: item.status == 'success'
? 'success'
: 'cancel'
}">

${
item.status == 'pending'
? '🕓 Menunggu Admin'
: item.status == 'success'
? '✅ Pesanan Success'
: '❌ Pesanan Cancel'
}

</div>

<img src="${item.bukti}"
class="bukti">

</div>

`;

}

});

document.getElementById('riwayat')
.innerHTML = html;

});

}

loadRiwayat();

</script>

</body>
</html>
