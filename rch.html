<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reach CH System</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.container{
max-width:430px;
margin:20px auto;
background:#1b1b1b;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,0,150,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2a2a2a;
color:white;
box-sizing:border-box;
margin-top:10px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
background:linear-gradient(45deg,#7b2ff7,#f107a3);
color:white;
font-size:15px;
cursor:pointer;
}

.item{
background:#2d2d2d;
padding:12px;
border-radius:12px;
margin-top:10px;
word-break:break-word;
}

.success{
border:1px solid lime;
}

.pending{
border:1px solid orange;
}
</style>
</head>
<body>

<div class="container">

<h1>🚀 Reach Saluran CH</h1>

<input type="text" id="link" placeholder="https://t.me/namasaluran">

<textarea id="emoji" rows="3" placeholder="🥰,😍,🔥"></textarea>

<button id="joinBtn" onclick="joinTelegram()">
📢 Join Saluran Telegram
</button>

<button id="sendBtn"
onclick="kirimPesanan()"
style="display:none;">

📨 Kirim Pesanan

</button>

<button onclick="window.location.href='indexutama.html'">
⬅️ Kembali Ke Website Utama
</button>

<h3>📜 Riwayat Pemesanan</h3>

<div id="riwayat"></div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDNWHQT0D16TMy9XQ0p0wYh42QwrvPFzaE",
authDomain: "reachchsystem-2d934.firebaseapp.com",
databaseURL: "https://reachchsystem-2d934-default-rtdb.asia-southeast1.firebasedatabase.app/",
projectId: "reachchsystem-2d934",
storageBucket: "reachchsystem-2d934.firebasestorage.app",
messagingSenderId: "1020994564198",
appId: "1:1020994564198:web:1cf23aeb506ed136dc7da7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function joinTelegram(){

window.open('https://t.me/usernamechannel','_blank');

document.getElementById('sendBtn').style.display='block';

document.getElementById('joinBtn').innerHTML =
'✅ Sudah Join Telegram';

}

function kirimPesanan(){

let link = document.getElementById('link').value.trim();

let emoji = document.getElementById('emoji').value.trim();

if(link === '' || emoji === ''){

alert('Lengkapi data terlebih dahulu!');

return;

}

const data = {
link:link,
emoji:emoji,
status:'pending',
time:Date.now()
};

db.ref('orders').push(data);

alert('Pesanan berhasil dikirim!');

document.getElementById('link').value='';
document.getElementById('emoji').value='';

}

function loadRiwayat(){

db.ref('orders').on('value', snap=>{

let html='';

snap.forEach(data=>{

let item = data.val();

html += `
<div class="item ${item.status === 'success'
? 'success'
: 'pending'}">

<b>Link:</b><br>
${item.link}<br><br>

<b>Emoji:</b><br>
${item.emoji}<br><br>

${item.status === 'success'
? '✅ ACCESS SUCCESS'
: '🕓 Menunggu Access Admin'}

</div>
`;

});

document.getElementById('riwayat').innerHTML = html;

});

}

loadRiwayat();
</script>

</body>
</html>
