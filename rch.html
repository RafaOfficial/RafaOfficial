<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reach CH</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.container{
max-width:430px;
margin:20px auto;
background:#1b1b1b;
padding:20px;
border-radius:20px;
}

h1{
text-align:center;
}

input,textarea{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2a2a2a;
color:white;
box-sizing:border-box;
margin-top:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
background:linear-gradient(45deg,#7b2ff7,#f107a3);
color:white;
font-size:15px;
cursor:pointer;
}

.item{
background:#2d2d2d;
padding:12px;
border-radius:12px;
margin-top:10px;
word-break:break-word;
}

.success{
border:1px solid lime;
}
</style>
</head>
<body>

<div class="container">

<h1>🚀 Reach Saluran CH</h1>

<input type="text" id="link" placeholder="https://t.me/namasaluran">

<textarea id="emoji" rows="3" placeholder="🥰,😍,🔥"></textarea>

<button id="joinBtn" onclick="joinTelegram()">📢 Join Saluran Telegram</button>

<button id="sendBtn" onclick="kirimPesanan()" style="display:none;">
📨 Kirim Pesanan
</button>

<button onclick="window.location.href='index.html'">
⬅️ Kembali
</button>

<h3>📜 Riwayat</h3>

<div id="riwayat"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDZ4vvqy52xcjfge9r0G35DLt6vUTL9WKM",
  authDomain: "reachchsystem.firebaseapp.com",
  projectId: "reachchsystem",
  storageBucket: "reachchsystem.firebasestorage.app",
  messagingSenderId: "758623115029",
  appId: "1:758623115029:web:456bcf2892ff5bfeb27b1c",
  measurementId: "G-6TY72B0S2W"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function joinTelegram(){
window.open('https://t.me/ErroBaiyles','_blank');

document.getElementById('sendBtn').style.display='block';

document.getElementById('joinBtn').innerText='✅ Sudah Join Telegram';
}

function kirimPesanan(){

let link = document.getElementById('link').value;
let emoji = document.getElementById('emoji').value;

if(link === '' || emoji === ''){
alert('Lengkapi data!');
return;
}

const data = {
link,
emoji,
status:'pending',
time:Date.now()
};

db.ref('orders').push(data);

alert('Pesanan berhasil dikirim!');

document.getElementById('link').value='';
document.getElementById('emoji').value='';
}

function loadRiwayat(){

db.ref('orders').on('value', snap=>{

let html='';

snap.forEach(data=>{

let item = data.val();

html += `
<div class="item ${item.status === 'success' ? 'success' : ''}">
Link: ${item.link}<br>
Emoji: ${item.emoji}<br><br>

${item.status === 'success'
? '✅ ACCESS SUCCESS'
: '🕓 Menunggu Access'}

</div>
`;

});

document.getElementById('riwayat').innerHTML = html;

});

}

loadRiwayat();
</script>

</body>
</html>
