<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5b7cfa">

<title>ENC Custom Tool</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/javascript-obfuscator/dist/index.browser.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
    scroll-behavior:smooth;
}

.title h1,.info h3{
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    background:#05060d;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    padding:15px;
    color:#f4f6ff;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(ellipse 60% 40% at 50% 0%,rgba(91,124,250,.28),transparent 60%),
    radial-gradient(ellipse 70% 45% at 15% 55%,rgba(60,80,200,.16),transparent 60%),
    radial-gradient(ellipse 70% 45% at 85% 90%,rgba(91,124,250,.20),transparent 60%);
    z-index:-1;
}

/* BACKGROUND */

.bg-circle1{
    position:fixed;
    width:380px;
    height:380px;
    border-radius:50%;
    background:rgba(91,124,250,.18);
    top:-120px;
    left:-120px;
    filter:blur(90px);
    z-index:-1;
}

.bg-circle2{
    position:fixed;
    width:420px;
    height:420px;
    border-radius:50%;
    background:rgba(124,147,255,.16);
    bottom:-150px;
    right:-150px;
    filter:blur(100px);
    z-index:-1;
}

/* FLOAT ICON */

.float-icon{
    position:absolute;
    color:#a5b4ff;
    opacity:.3;
    font-size:20px;
    animation:float 4s ease-in-out infinite;
}

.icon1{
    top:10%;
    left:10%;
}

.icon2{
    bottom:15%;
    right:12%;
    animation-delay:1s;
}

.icon3{
    top:40%;
    right:18%;
    animation-delay:2s;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* CONTAINER */

.container{
    width:100%;
    max-width:390px;
    position:relative;
    z-index:2;
}

/* CARD */

.card{
    background:linear-gradient(160deg,#10142c,#0a0d1f);
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    padding:20px;
    box-shadow:
    0 20px 60px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.04);
    position:relative;
    overflow:hidden;
}

.card::before{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 30% 0%,rgba(91,124,250,.14),transparent 55%);
    pointer-events:none;
}

/* BACK BUTTON */

.back-wrap{
    margin-bottom:14px;
    position:relative;
    z-index:1;
}

.back-btn{
    width:60px;
    height:60px;
    background:linear-gradient(145deg,#1a2044,#0e1230);
    border-radius:18px;
    border:1px solid rgba(124,147,255,.35);
    box-shadow:0 0 20px rgba(91,124,250,.25);
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 26px rgba(91,124,250,.4);
}

.back-inner{
    width:40px;
    height:40px;
    background:linear-gradient(145deg,#5b7cfa,#324adf);
    border-radius:12px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:700;
    border:1px solid rgba(124,147,255,.4);
}

.back-inner span{
    font-size:8px;
    margin-top:-2px;
}

.arrow{
    font-size:18px;
    line-height:14px;
}

/* LOGO */

.logo{
    width:72px;
    height:72px;
    margin:auto;
    background:linear-gradient(145deg,#5b7cfa,#324adf);
    border-radius:20px;
    border:1px solid rgba(124,147,255,.4);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    box-shadow:0 0 26px rgba(91,124,250,.55);
    margin-bottom:14px;
    position:relative;
    z-index:1;
    animation:float 3s ease-in-out infinite;
}

/* TITLE */

.title{
    text-align:center;
    position:relative;
    z-index:1;
}

.title h1{
    background:linear-gradient(90deg,#f4f6ff,#a5b4ff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    font-size:24px;
    font-weight:800;
    letter-spacing:.3px;
}

.title p{
    margin-top:6px;
    color:#8b93b8;
    font-size:11.5px;
    font-weight:500;
}

.badge-row{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:12px;
    flex-wrap:wrap;
    position:relative;
    z-index:1;
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 12px;
    border-radius:20px;
    background:rgba(91,124,250,.1);
    border:1px solid rgba(124,147,255,.3);
    color:#a5b4ff;
    font-size:10.5px;
    font-weight:600;
}

.badge .dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:#3ddc84;
    box-shadow:0 0 8px #3ddc84;
}

/* INPUT GROUP */

.input-group{
    margin-top:16px;
    position:relative;
    z-index:1;
}

.label{
    color:#c7d1ff;
    font-weight:600;
    margin-bottom:7px;
    display:block;
    font-size:12px;
}

/* FILE */

.file-box{
    position:relative;
}

.file-box input[type=file]{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
    z-index:2;
}

.custom-file{
    width:100%;
    background:linear-gradient(160deg,#161c3c,#0d1128);
    border:1px solid rgba(124,147,255,.3);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    border-radius:18px;
    padding:14px;
    color:#f4f6ff;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:10px;
    overflow:hidden;
    font-size:12px;
    transition:.3s;
}

.file-box:hover .custom-file{
    border-color:rgba(124,147,255,.55);
    box-shadow:0 8px 20px rgba(91,124,250,.25);
}

.custom-file span{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

/* TEXT INPUT */

.text-input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:18px;
    background:linear-gradient(160deg,#161c3c,#0d1128);
    color:#f4f6ff;
    font-weight:600;
    border:1px solid rgba(124,147,255,.3);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    font-size:12px;
    transition:.3s;
}

.text-input:focus{
    border-color:rgba(124,147,255,.6);
    box-shadow:0 0 0 3px rgba(91,124,250,.2);
}

.text-input::placeholder{
    color:#5b6382;
}

/* BUTTON */

.main-btn{
    width:100%;
    padding:14px;
    margin-top:16px;
    border:none;
    border-radius:18px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    position:relative;
    z-index:1;
}

.encrypt-btn{
    background:linear-gradient(145deg,#5b7cfa,#324adf);
    color:#ffffff;
    border:1px solid rgba(124,147,255,.4);
    box-shadow:0 8px 24px rgba(91,124,250,.4);
}

.encrypt-btn:hover{
    box-shadow:0 12px 28px rgba(91,124,250,.55);
}

.download-btn{
    background:linear-gradient(145deg,#3ddc84,#1f9d5c);
    color:#052013;
    border:1px solid rgba(61,220,132,.4);
    box-shadow:0 8px 24px rgba(61,220,132,.3);
}

.download-btn:hover{
    box-shadow:0 12px 28px rgba(61,220,132,.45);
}

.main-btn:hover{
    transform:translateY(-3px);
}

/* OUTPUT */

.output{
    margin-top:16px;
    background:linear-gradient(160deg,#0d1128,#070a18);
    color:#c7d1ff;
    padding:14px;
    border-radius:18px;
    border:1px solid rgba(124,147,255,.25);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    max-height:180px;
    overflow:auto;
    font-size:11px;
    line-height:1.5;
    word-break:break-word;
    font-family:'Courier New',monospace;
    position:relative;
    z-index:1;
}

.output::-webkit-scrollbar{
    width:5px;
}

.output::-webkit-scrollbar-thumb{
    background:#5b7cfa;
    border-radius:20px;
}

/* LOADING */

.loading-wrap{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:15px;
    font-family:'Inter',sans-serif;
}

.loader{
    width:42px;
    height:42px;
    border:5px solid rgba(124,147,255,.2);
    border-top:5px solid #5b7cfa;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:12px;
}

.loading-text{
    font-weight:600;
    color:#c7d1ff;
    text-align:center;
    font-size:12px;
}

@keyframes spin{

    0%{
        transform:rotate(0deg);
    }

    100%{
        transform:rotate(360deg);
    }

}

/* INFO */

.info{
    margin-top:16px;
    background:rgba(91,124,250,.1);
    border:1px solid rgba(124,147,255,.3);
    padding:14px;
    border-radius:18px;
    position:relative;
    z-index:1;
}

.info h3{
    color:#a5b4ff;
    margin-bottom:7px;
    font-size:13px;
    font-weight:700;
}

.info p{
    color:#8b93b8;
    font-size:11px;
    line-height:1.6;
}

.info code{
    background:rgba(91,124,250,.15);
    color:#c7d1ff;
    padding:2px 6px;
    border-radius:6px;
    font-family:'Courier New',monospace;
}

/* FOOTER */

.footer{
    text-align:center;
    margin-top:16px;
    color:#8b93b8;
    font-size:10.5px;
    font-weight:500;
    position:relative;
    z-index:1;
}

.footer span{
    color:#a5b4ff;
    font-weight:700;
}

@media(max-width:400px){
.title h1{font-size:21px;}
}

</style>
</head>

<body>

<div class="bg-circle1"></div>
<div class="bg-circle2"></div>

<div class="float-icon icon1">✦</div>
<div class="float-icon icon2">⚡</div>
<div class="float-icon icon3">✦</div>

<div class="container">

<div class="card">

<!-- BACK -->

<div class="back-wrap">

<a href="index.html" class="back-btn">

<div class="back-inner">

<div class="arrow">⬅</div>

<span>BACK</span>

</div>

</a>

</div>

<!-- LOGO -->

<div class="logo">
🔒
</div>

<!-- TITLE -->

<div class="title">

<h1>ENC Custom Pro</h1>

<p>Lindungi source code JavaScript kamu secara instan</p>

<div class="badge-row">
<div class="badge"><span class="dot"></span> Encryption Aktif</div>
<div class="badge">⚡ Proses Cepat</div>
</div>

</div>

<!-- FILE -->

<div class="input-group">

<label class="label">
📁 Upload File .JS
</label>

<div class="file-box">

<input type="file" id="file" accept=".js">

<div class="custom-file" id="fileText">

📄 <span>Upload File .JS</span>

</div>

</div>

</div>

<!-- TEXT -->

<div class="input-group">

<label class="label">
🔑 Custom Identifier
</label>

<input
type="text"
id="key"
class="text-input"
placeholder="text1|text2">

</div>

<!-- BUTTON -->

<button
class="main-btn encrypt-btn"
onclick="encrypt()">

⚙️ Encrypt Javascript

</button>

<!-- OUTPUT -->

<div class="output" id="out">

🔐 Tunggu 1 atau 3 Menit...

</div>

<!-- DOWNLOAD -->

<button
class="main-btn download-btn"
onclick="download()">

⬇ Download Result

</button>

<!-- INFO -->

<div class="info">

<h3>⚠ Information</h3>

<p>

Gunakan format: <code>text1|text2</code>

<br><br>

Contoh: <code>rafa|official</code>

</p>

</div>

<div class="footer">
© <span>Rafa Official</span> • Premium Encryption UI
</div>

</div>
</div>

<script>

let hasil = "";

/* FILE NAME */

document
.getElementById("file")
.addEventListener("change", function(){

    const file =
    this.files[0];

    const text =
    document.querySelector("#fileText span");

    if(file){

        text.innerText =
        file.name;

    }else{

        text.innerText =
        "Upload File .JS";

    }

});

/* ENCRYPT */

async function encrypt(){

    try{

        const file =
        document.getElementById("file").files[0];

        const key =
        document.getElementById("key").value;

        if(!file){

            return alert("❌ Upload file JS dulu");

        }

        if(!key.includes("|")){

            return alert("❌ Format wajib text1|text2");

        }

        const [text1,text2] =
        key.split("|");

        const reader =
        new FileReader();

        const out =
        document.getElementById("out");

        out.innerHTML = `

        <div class="loading-wrap">

            <div class="loader"></div>

            <div class="loading-text">

                ⚡ Sedang Encrypt File...

            </div>

        </div>

        `;

        out.scrollIntoView({
            behavior:"smooth"
        });

        reader.onload =
        async function(e){

            try{

                const code =
                e.target.result;

                await new Promise(resolve =>
                    setTimeout(resolve,1500)
                );

                const obfuscated =
                JavaScriptObfuscator.obfuscate(code,{

                    compact:true,

                    controlFlowFlattening:true,

                    deadCodeInjection:true,

                    stringArrayEncoding:['base64'],

                    identifierNamesGenerator:'mangled',

                    renameGlobals:true,

                    identifiersPrefix:
                    `高宝座${text1}齐${text2}高宝座`

                });

                hasil =
                obfuscated.getObfuscatedCode();

                out.innerText =
                hasil.substring(0,1200) + "...";

                setTimeout(()=>{

                    out.scrollIntoView({
                        behavior:"smooth",
                        block:"center"
                    });

                },300);

            }catch(err){

                alert("❌ Encrypt Error : " + err.message);

            }

        };

        reader.readAsText(file);

    }catch(err){

        alert("❌ Error : " + err.message);

    }

}

/* DOWNLOAD */

function download(){

    if(!hasil){

        return alert("❌ Belum ada hasil encrypt");

    }

    const blob =
    new Blob([hasil],{
        type:"application/javascript"
    });

    const a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "encrypted.js";

    a.click();

}

</script>

</body>
</html>
