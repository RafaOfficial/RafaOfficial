<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6d4c41">

<title>ENC Custom Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/javascript-obfuscator/dist/index.browser.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    background:
    radial-gradient(circle at top left,#b38867 0%,#8d6e63 20%,#6d4c41 45%,#2d1b16 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    padding:15px;
}

/* BACKGROUND */

.bg-circle1{
    position:absolute;
    width:220px;
    height:220px;
    background:#d7ccc8;
    border-radius:50%;
    top:-80px;
    left:-80px;
    opacity:.08;
    filter:blur(10px);
}

.bg-circle2{
    position:absolute;
    width:180px;
    height:180px;
    background:#efebe9;
    border-radius:50%;
    bottom:-60px;
    right:-60px;
    opacity:.08;
    filter:blur(10px);
}

/* FLOAT ICON */

.float-icon{
    position:absolute;
    color:#fff3e0;
    opacity:.18;
    font-size:20px;
    animation:float 4s ease-in-out infinite;
}

.icon1{
    top:10%;
    left:10%;
}

.icon2{
    bottom:15%;
    right:12%;
    animation-delay:1s;
}

.icon3{
    top:40%;
    right:18%;
    animation-delay:2s;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* CONTAINER */

.container{
    width:100%;
    max-width:390px;
    position:relative;
    z-index:2;
}

/* CARD */

.card{
    background:#6d4c41;
    border:3px solid #f5e0d3;
    border-radius:28px;
    padding:18px;
    box-shadow:
    7px 7px 0px #2d1b16,
    0 0 20px rgba(0,0,0,.2);
    position:relative;
}

/* BACK BUTTON */

.back-wrap{
    margin-bottom:12px;
}

.back-btn{
    width:62px;
    height:62px;
    background:#f6a84d;
    border-radius:18px;
    border:4px solid #f7f1eb;
    box-shadow:
    5px 5px 0 #c63f12;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    transition:.2s;
}

.back-btn:hover{
    transform:translateY(-2px);
}

.back-inner{
    width:40px;
    height:40px;
    background:#8fa6b2;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:800;
    border:2px solid #dbe3e8;
}

.back-inner span{
    font-size:8px;
    margin-top:-2px;
}

.arrow{
    font-size:18px;
    line-height:14px;
}

/* LOGO */

.logo{
    width:72px;
    height:72px;
    margin:auto;
    background:#fff3e0;
    border-radius:20px;
    border:3px solid #3e2723;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    box-shadow:4px 4px 0 #3e2723;
    margin-bottom:12px;
}

/* TITLE */

.title{
    text-align:center;
}

.title h1{
    color:white;
    font-size:24px;
    font-weight:800;
    text-shadow:3px 3px 0px #3e2723;
}

.title p{
    margin-top:5px;
    color:#f8d7c8;
    font-size:11px;
}

/* INPUT GROUP */

.input-group{
    margin-top:15px;
}

.label{
    color:#fff3e0;
    font-weight:700;
    margin-bottom:6px;
    display:block;
    font-size:12px;
}

/* FILE */

.file-box{
    position:relative;
}

.file-box input[type=file]{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
    z-index:2;
}

.custom-file{
    width:100%;
    background:#fff3e0;
    border:2px solid #3e2723;
    box-shadow:4px 4px 0 #3e2723;
    border-radius:18px;
    padding:13px;
    color:#4e342e;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:10px;
    overflow:hidden;
    font-size:12px;
}

.custom-file span{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

/* TEXT INPUT */

.text-input{
    width:100%;
    padding:13px;
    border:none;
    outline:none;
    border-radius:18px;
    background:#fff3e0;
    color:#3e2723;
    font-weight:700;
    border:2px solid #3e2723;
    box-shadow:4px 4px 0 #3e2723;
    font-size:12px;
}

.text-input::placeholder{
    color:#8d6e63;
}

/* BUTTON */

.main-btn{
    width:100%;
    padding:13px;
    margin-top:15px;
    border:none;
    border-radius:18px;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
}

.encrypt-btn{
    background:#ffcc80;
    color:#4e342e;
    border:2px solid #4e342e;
    box-shadow:4px 4px 0 #4e342e;
}

.download-btn{
    background:#c5e1a5;
    color:#2e4630;
    border:2px solid #2e4630;
    box-shadow:4px 4px 0 #2e4630;
}

.main-btn:hover{
    transform:translateY(-2px);
}

/* OUTPUT */

.output{
    margin-top:15px;
    background:#fff3e0;
    color:#3e2723;
    padding:14px;
    border-radius:18px;
    border:2px solid #3e2723;
    box-shadow:4px 4px 0 #3e2723;
    max-height:180px;
    overflow:auto;
    font-size:11px;
    line-height:1.5;
    word-break:break-word;
}

.output::-webkit-scrollbar{
    width:5px;
}

.output::-webkit-scrollbar-thumb{
    background:#6d4c41;
    border-radius:20px;
}

/* LOADING */

.loading-wrap{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.loader{
    width:42px;
    height:42px;
    border:5px solid #d7ccc8;
    border-top:5px solid #6d4c41;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:12px;
}

.loading-text{
    font-weight:700;
    color:#4e342e;
    text-align:center;
    font-size:12px;
}

@keyframes spin{

    0%{
        transform:rotate(0deg);
    }

    100%{
        transform:rotate(360deg);
    }

}

/* INFO */

.info{
    margin-top:15px;
    background:#8d6e63;
    border:2px solid #f5e0d3;
    padding:12px;
    border-radius:18px;
}

.info h3{
    color:white;
    margin-bottom:6px;
    font-size:13px;
}

.info p{
    color:#f8d7c8;
    font-size:11px;
    line-height:1.5;
}

/* FOOTER */

.footer{
    text-align:center;
    margin-top:15px;
    color:#f5d7c8;
    font-size:10px;
}

</style>
</head>

<body>

<div class="bg-circle1"></div>
<div class="bg-circle2"></div>

<div class="float-icon icon1">✦</div>
<div class="float-icon icon2">⚡</div>
<div class="float-icon icon3">✦</div>

<div class="container">

<div class="card">

<!-- BACK -->

<div class="back-wrap">

<a href="index.html" class="back-btn">

<div class="back-inner">

<div class="arrow">⬅</div>

<span>BACK</span>

</div>

</a>

</div>

<!-- LOGO -->

<div class="logo">
🔒
</div>

<!-- TITLE -->

<div class="title">

<h1>ENC CUSTOM</h1>

<p>Dark Cartoon Brutalism Milk Brown UI</p>

</div>

<!-- FILE -->

<div class="input-group">

<label class="label">
📁 Upload File .JS
</label>

<div class="file-box">

<input type="file" id="file" accept=".js">

<div class="custom-file" id="fileText">

📄 <span>Upload File .JS</span>

</div>

</div>

</div>

<!-- TEXT -->

<div class="input-group">

<label class="label">
🔑 Custom Identifier
</label>

<input
type="text"
id="key"
class="text-input"
placeholder="text1|text2">

</div>

<!-- BUTTON -->

<button
class="main-btn encrypt-btn"
onclick="encrypt()">

⚙️ Encrypt Javascript

</button>

<!-- OUTPUT -->

<div class="output" id="out">

🔐 Tunggu 1 atau 3 Menit...

</div>

<!-- DOWNLOAD -->

<button
class="main-btn download-btn"
onclick="download()">

⬇ Download Result

</button>

<!-- INFO -->

<div class="info">

<h3>⚠ Information</h3>

<p>

Gunakan format:
<br><br>

text1|text2

<br><br>

Contoh:
<br>

rafa|official

</p>

</div>

<div class="footer">
© Rafa Official • Cartoon Brutalism UI
</div>

</div>
</div>

<script>

let hasil = "";

/* FILE NAME */

document
.getElementById("file")
.addEventListener("change", function(){

    const file =
    this.files[0];

    const text =
    document.querySelector("#fileText span");

    if(file){

        text.innerText =
        file.name;

    }else{

        text.innerText =
        "Upload File .JS";

    }

});

/* ENCRYPT */

async function encrypt(){

    try{

        const file =
        document.getElementById("file").files[0];

        const key =
        document.getElementById("key").value;

        if(!file){

            return alert("❌ Upload file JS dulu");

        }

        if(!key.includes("|")){

            return alert("❌ Format wajib text1|text2");

        }

        const [text1,text2] =
        key.split("|");

        const reader =
        new FileReader();

        const out =
        document.getElementById("out");

        out.innerHTML = `

        <div class="loading-wrap">

            <div class="loader"></div>

            <div class="loading-text">

                ⚡ Sedang Encrypt File...

            </div>

        </div>

        `;

        out.scrollIntoView({
            behavior:"smooth"
        });

        reader.onload =
        async function(e){

            try{

                const code =
                e.target.result;

                await new Promise(resolve =>
                    setTimeout(resolve,1500)
                );

                const obfuscated =
                JavaScriptObfuscator.obfuscate(code,{

                    compact:true,

                    controlFlowFlattening:true,

                    deadCodeInjection:true,

                    stringArrayEncoding:['base64'],

                    identifierNamesGenerator:'mangled',

                    renameGlobals:true,

                    identifiersPrefix:
                    `高宝座${text1}齐${text2}高宝座`

                });

                hasil =
                obfuscated.getObfuscatedCode();

                out.innerText =
                hasil.substring(0,1200) + "...";

                setTimeout(()=>{

                    out.scrollIntoView({
                        behavior:"smooth",
                        block:"center"
                    });

                },300);

            }catch(err){

                alert("❌ Encrypt Error : " + err.message);

            }

        };

        reader.readAsText(file);

    }catch(err){

        alert("❌ Error : " + err.message);

    }

}

/* DOWNLOAD */

function download(){

    if(!hasil){

        return alert("❌ Belum ada hasil encrypt");

    }

    const blob =
    new Blob([hasil],{
        type:"application/javascript"
    });

    const a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "encrypted.js";

    a.click();

}

</script>

</body>
</html>
