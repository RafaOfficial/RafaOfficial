<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6d4c41">
<title>Fake Ustadz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
radial-gradient(circle at bottom,#9c5f2e,#6d4c41,#3e2723);
overflow-x:hidden;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
repeating-linear-gradient(
90deg,
rgba(255,255,255,.02) 0px,
rgba(255,255,255,.02) 2px,
transparent 2px,
transparent 24px
);
pointer-events:none;
}

.container{
width:100%;
max-width:650px;
background:rgba(141,110,99,.28);
backdrop-filter:blur(10px);
border:8px solid #fff;
border-radius:40px;
padding:30px;
box-shadow:
18px 18px 0 rgba(0,0,0,.55);
animation:show .5s ease;
}

@keyframes show{
from{
transform:translateY(20px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

.title{
text-align:center;
font-size:58px;
font-weight:900;
color:#fff;
text-shadow:
6px 6px 0 rgba(0,0,0,.45);
margin-bottom:10px;
}

.desc{
text-align:center;
color:#ffe0b2;
font-size:18px;
line-height:1.7;
margin-bottom:25px;
}

.input-box{
width:100%;
padding:22px;
font-size:20px;
border:none;
outline:none;
border-radius:35px;
background:#efe5d4;
border:6px solid #fff;
color:#555;
box-shadow:
10px 10px 0 rgba(0,0,0,.15);
}

.btn{
width:100%;
padding:22px;
margin-top:18px;
font-size:26px;
font-weight:900;
border:none;
cursor:pointer;
border-radius:35px;
border:6px solid #fff;
transition:.2s;
color:#fff;
}

.btn:hover{
transform:translateY(-3px);
}

.generate{
background:
linear-gradient(
180deg,
#9c27b0,
#7b1fa2
);
box-shadow:
10px 10px 0 #5e1696;
}

.back{
background:
linear-gradient(
180deg,
#ffb74d,
#ff7043
);
box-shadow:
10px 10px 0 #d84315;
}

.download{
background:
linear-gradient(
180deg,
#4caf50,
#2e7d32
);
box-shadow:
10px 10px 0 #1b5e20;
display:none;
}

.result{
display:none;
margin-top:25px;
animation:fade .5s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.result img{
width:100%;
border-radius:25px;
border:6px solid #fff;
box-shadow:
12px 12px 0 rgba(0,0,0,.35);
}

.loading{
display:none;
margin-top:20px;
text-align:center;
font-size:22px;
font-weight:900;
color:#fff;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.08);
}
}

.credit{
margin-top:20px;
text-align:center;
font-size:13px;
color:#f5e6d3;
}

@media(max-width:600px){

.container{
padding:22px;
border-radius:30px;
}

.title{
font-size:42px;
}

.desc{
font-size:16px;
}

.input-box{
font-size:17px;
padding:18px;
}

.btn{
font-size:22px;
padding:18px;
}

}
</style>
</head>
<body>

<div class="container">

<div class="title">👳‍♂️ Fake Ustadz</div>

<div class="desc">
Buat fake pertanyaan Pak ustadz 
</div>

<input
type="text"
id="question"
class="input-box"
placeholder="Contoh : apa hukum nikah bin"
/>

<button class="btn generate" onclick="generateFake()">
✨ Generate Fake
</button>

<button class="btn back" onclick="location.href='index.html'">
🔙 Back
</button>

<div class="loading" id="loading">
⏳ Sedang membuat fake ustadz...
</div>

<div class="result" id="result">
<img id="preview">

<button class="btn download" id="downloadBtn" onclick="downloadImage()">
📥 Download Image
</button>
</div>

<div class="credit">
Rafa Official • Fake Ustadz Generator
</div>

</div>

<script>
let imageURL = "";

function generateFake(){

const text =
document.getElementById("question").value.trim();

if(!text){
alert("Masukkan pertanyaan terlebih dahulu");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("result").style.display="none";
document.getElementById("downloadBtn").style.display="none";

const api =
`https://api.azbry.com/api/maker/tanyaustadz?text=${encodeURIComponent(text)}`;

const img =
document.getElementById("preview");

img.onload = function(){

document.getElementById("loading").style.display="none";

document.getElementById("result").style.display="block";

document.getElementById("downloadBtn").style.display="block";
};

img.onerror = function(){

document.getElementById("loading").style.display="none";

alert("Gagal membuat gambar");
};

img.src = api;
imageURL = api;
}

async function downloadImage() {

if (!imageURL) return;

try {

const response = await fetch(imageURL);

const blob = await response.blob();

const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;

a.download = `fakeustadz-${Date.now()}.jpg`;

document.body.appendChild(a);

a.click();

a.remove();

window.URL.revokeObjectURL(url);

} catch(err) {

window.open(imageURL, "_blank");

}

}
</script>

</body>
</html>
