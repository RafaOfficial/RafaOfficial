<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pinterest Pro</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: sans-serif;
    background: radial-gradient(circle at top, #1a0033, #050505);
    color:white;
}

/* HEADER */
header {
    display:flex;
    justify-content:space-between;
    padding:15px;
}

/* SEARCH */
.search-box {
    text-align:center;
    padding:10px;
}

input {
    width:70%;
    padding:12px;
    border:none;
    border-radius:15px;
    background:#111;
    color:white;
}

.search-btn {
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#a855f7,#ec4899);
    color:white;
}

/* GRID FIX 2 KOLOM */
.grid {
    column-count: 2;
    column-gap: 12px;
    padding: 10px;
}

.card {
    break-inside: avoid;
    background:#111;
    margin-bottom:12px;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(168,85,247,0.3);
    position:relative;
}

.card img {
    width:100%;
}

/* DOWNLOAD BUTTON */
.download {
    position:absolute;
    bottom:10px;
    left:10px;
    right:10px;
    padding:8px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#9333ea,#ec4899);
    color:white;
}

/* FAB BULAT FIX */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;

    width: 55px;
    height: 55px;

    display: flex;
    align-items: center;
    justify-content: center;

    background: linear-gradient(45deg, #a855f7, #ec4899);
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;

    box-shadow: 0 0 20px rgba(168,85,247,0.6);
}
</style>
</head>

<body>

<header>
    <div onclick="index.html()">Back⬅</div>
    <div>PINTEREST PRO</div>
</header>

<div class="search-box">
    <input id="search" placeholder="Cari gambar...">
    <button class="search-btn" onclick="startSearch()">SEARCH</button>
</div>

<div id="result" class="grid"></div>


<script>
const API = "https://api-faa.my.id/faa/pinterest?q=";

let query = "";
let loading = false;

// START SEARCH
function startSearch() {
    query = document.getElementById("search").value;
    if (!query) return alert("Isi dulu!");

    document.getElementById("result").innerHTML = "";
    loadMore();
}

// INFINITE SCROLL
async function loadMore() {
    if (loading) return;
    loading = true;

    try {
        const res = await fetch(API + encodeURIComponent(query));
        const data = await res.json();

        const container = document.getElementById("result");

        data.result.forEach(url => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="${url}">
                <button class="download" onclick="downloadImage('${url}')">
                    ⬇ Download
                </button>
            `;

            container.appendChild(div);
        });

    } catch {}

    loading = false;
}

// AUTO LOAD SAAT SCROLL
window.addEventListener("scroll", () => {
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) {
        loadMore();
    }
});

// DOWNLOAD FIX
async function downloadImage(url) {
    try {
        let res;
        try {
            res = await fetch(url);
        } catch {
            res = null;
        }

        if (!res || !res.ok) {
            res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
        }

        const blob = await res.blob();
        const a = document.createElement("a");

        a.href = URL.createObjectURL(blob);
        a.download = "pin_" + Date.now() + ".jpg";

        a.click();
    } catch {
        window.open(url);
    }
}

function scrollTop() {
    window.scrollTo({ top:0, behavior:"smooth" });
}
</script>

</body>
</html>
