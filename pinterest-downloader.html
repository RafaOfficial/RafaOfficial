<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5b7cfa">
<title>Search Wallpaper/PP — RafaXMods</title>

<!-- Fonts & Icons -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
scroll-behavior:smooth;
}

h1,h2,.logo-top span,.section-title,.label,.hero-title,.modal-btn{
font-family:'Poppins',sans-serif;
}

/* BODY BACKGROUND THEME */
body{
background:#05060d;
min-height:100vh;
overflow-x:hidden;
padding-top:100px;
color:#f4f6ff;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(ellipse 60% 40% at 50% 0%,rgba(91,124,250,.28),transparent 60%),
radial-gradient(ellipse 70% 45% at 15% 55%,rgba(60,80,200,.16),transparent 60%),
radial-gradient(ellipse 70% 45% at 85% 90%,rgba(91,124,250,.20),transparent 60%);
z-index:-1;
}

.circle1{
position:fixed;
width:380px;
height:380px;
border-radius:50%;
background:rgba(91,124,250,.18);
top:-120px;
left:-120px;
filter:blur(90px);
z-index:-1;
}

.circle2{
position:fixed;
width:420px;
height:420px;
border-radius:50%;
background:rgba(124,147,255,.16);
bottom:-150px;
right:-150px;
filter:blur(100px);
z-index:-1;
}

/* SCROLLBAR */
::-webkit-scrollbar{
width:6px;
}
::-webkit-scrollbar-thumb{
background:#5b7cfa;
border-radius:20px;
}

/* TOPBAR / HEADER */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:82px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
background:rgba(9,12,26,.75);
backdrop-filter:blur(16px);
-webkit-backdrop-filter:blur(16px);
border-bottom:1px solid rgba(255,255,255,.08);
box-shadow:0 8px 30px rgba(0,0,0,.55);
z-index:999;
}

.logo-top{
display:flex;
align-items:center;
gap:12px;
}

.logo-top span{
font-size:22px;
font-weight:700;
letter-spacing:.2px;
color:#f4f6ff;
}

.back-btn{
width:50px;
height:50px;
border-radius:16px;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
background:linear-gradient(145deg,#1a2044,#0e1230);
border:1px solid rgba(124,147,255,.35);
box-shadow:0 0 20px rgba(91,124,250,.25),inset 0 1px 0 rgba(255,255,255,.05);
cursor:pointer;
color:white;
transition:.2s;
}

.back-btn:hover{
transform:translateY(-2px);
border-color:rgba(124,147,255,.6);
box-shadow:0 0 25px rgba(91,124,250,.4);
}

/* HERO CONTAINER */
#main-content{
max-width:640px;
margin:0 auto;
padding:0 20px;
}

.hero{
text-align:center;
margin-bottom:30px;
}

.hero-box{
padding:10px 0;
}

.hero-title{
font-size:32px;
font-weight:700;
line-height:1.25;
color:#f4f6ff;
margin-bottom:12px;
}

.hero-title .accent{
background:linear-gradient(90deg,#5b7cfa,#a5b4ff);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
}

.hero-desc{
font-size:14.5px;
line-height:1.7;
color:#8b93b8;
}

/* SEARCH AREA */
.search-area{
margin-bottom:35px;
}

.search-card{
padding:24px 20px;
border-radius:22px;
background:linear-gradient(160deg,#10142c,#0a0d1f);
border:1px solid rgba(255,255,255,.07);
box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 10px 30px rgba(0,0,0,.3);
}

.label{
font-size:16px;
font-weight:600;
color:#f4f6ff;
margin-bottom:12px;
display:flex;
align-items:center;
gap:8px;
}

.input{
width:100%;
height:54px;
border-radius:16px;
border:1px solid rgba(124,147,255,.25);
background:#070a18;
padding:0 18px;
font-size:15px;
color:#f4f6ff;
outline:none;
transition:.3s;
}

.input:focus{
border-color:rgba(124,147,255,.6);
box-shadow:0 0 15px rgba(91,124,250,.2);
}

.input::placeholder{
color:#525a7f;
}

.search-btn{
margin-top:16px;
width:100%;
height:54px;
border:none;
border-radius:16px;
background:linear-gradient(145deg,#5b7cfa,#324adf);
box-shadow:0 8px 24px rgba(91,124,250,.35);
font-size:15px;
font-weight:600;
color:white;
cursor:pointer;
transition:.3s;
}

.search-btn:hover{
transform:translateY(-2px);
box-shadow:0 12px 28px rgba(91,124,250,.5);
}

/* LOADER */
.loader{
display:none;
text-align:center;
padding:30px;
}

.spinner{
width:46px;
height:46px;
border:4px solid rgba(91,124,250,.15);
border-top:4px solid #5b7cfa;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
box-shadow:0 0 15px rgba(91,124,250,.2);
}

@keyframes spin{
100%{ transform:rotate(360deg); }
}

.loader p{
margin-top:14px;
font-size:14.5px;
font-weight:600;
color:#8b93b8;
}

/* RESULTS GRID (Pinterest Waterfalls Style adjusted to modern template) */
.results{
column-count:2;
column-gap:16px;
padding:10px 0 100px;
}

.pin-card{
position:relative;
margin-bottom:16px;
break-inside:avoid;
border-radius:18px;
overflow:hidden;
background:#10142c;
border:1px solid rgba(255,255,255,.07);
box-shadow:0 8px 24px rgba(0,0,0,.3);
animation:show .4s cubic-bezier(.175,.885,.32,1.275) forwards;
cursor:pointer;
transition:.3s;
}

.pin-card:hover{
transform:translateY(-4px);
border-color:rgba(124,147,255,.4);
box-shadow:0 12px 28px rgba(91,124,250,.25);
}

@keyframes show{
from{ opacity:0; transform:translateY(20px); }
to{ opacity:1; transform:none; }
}

.pin-img{
width:100%;
display:block;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(5,6,13,.9), transparent 70%);
display:flex;
align-items:flex-end;
justify-content:center;
padding:14px;
opacity:0;
transition:.25s;
}

.pin-card:hover .overlay{
opacity:1;
}

.download-btn{
width:100%;
height:38px;
border:none;
border-radius:12px;
background:linear-gradient(145deg,#5b7cfa,#324adf);
font-size:13px;
font-weight:600;
color:white;
cursor:pointer;
box-shadow:0 4px 12px rgba(91,124,250,.3);
}

/* MODAL VIEW IMAGE */
.modal{
position:fixed;
inset:0;
background:rgba(2,3,10,.85);
backdrop-filter:blur(6px);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
padding:20px;
z-index:99999;
}

.modal.active{
display:flex;
}

.modal img{
max-width:100%;
max-height:65vh;
border-radius:22px;
border:1px solid rgba(124,147,255,.3);
box-shadow:0 0 50px rgba(91,124,250,.25), 0 20px 50px rgba(0,0,0,.5);
animation:popup .3s ease;
}

@keyframes popup{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.modal-actions{
margin-top:24px;
display:flex;
gap:14px;
width:100%;
max-width:360px;
}

.modal-btn{
flex:1;
height:50px;
border:none;
border-radius:16px;
font-size:14.5px;
font-weight:600;
cursor:pointer;
color:white;
transition:.2s;
}

.btn-download{
background:linear-gradient(145deg,#5b7cfa,#324adf);
box-shadow:0 6px 20px rgba(91,124,250,.35);
}

.btn-download:hover{
transform:translateY(-2px);
}

.btn-close{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
color:#8b93b8;
}

.btn-close:hover{
background:rgba(255,255,255,.1);
color:#f4f6ff;
}

/* FLOATING ACTION BUTTON (FAB) */
.fab{
position:fixed;
bottom:24px;
right:24px;
width:52px;
height:52px;
border:none;
border-radius:16px;
background:linear-gradient(145deg,#5b7cfa,#324adf);
font-size:18px;
color:white;
cursor:pointer;
box-shadow:0 6px 20px rgba(91,124,250,.4);
z-index:99;
transition:.3s;
display:flex;
align-items:center;
justify-content:center;
}

.fab:hover{
transform:translateY(-3px);
box-shadow:0 10px 24px rgba(91,124,250,.5);
}

/* NOTIFICATION */
.notification{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:rgba(91,124,250,.95);
color:white;
padding:12px 24px;
border-radius:30px;
font-size:13.5px;
font-weight:600;
box-shadow:0 10px 30px rgba(91,124,250,.4);
z-index:999999;
pointer-events:none;
max-width:88vw;
text-align:center;
animation:fadeUp .3s cubic-bezier(.175,.885,.32,1.275) forwards;
}

@keyframes fadeUp{
to{ transform:translateX(-50%) translateY(0); }
}

/* FOOTER STYLING */
.footer{
margin-top:20px;
padding:26px 20px;
text-align:center;
border-top:1px solid rgba(255,255,255,.07);
}

.footer-brand{
font-family:'Poppins',sans-serif;
font-size:16px;
font-weight:700;
color:#f4f6ff;
margin-bottom:6px;
}

.footer-text{
font-size:12.5px;
font-weight:500;
color:#8b93b8;
line-height:1.6;
}
</style>
</head>
<body>

<div class="circle1"></div>
<div class="circle2"></div>

<!-- TOPBAR / HEADER -->
<header class="topbar">
<div class="logo-top">
<span>RafaXMods Tools</span>
</div>
<div class="back-btn" onclick="window.location.href='index.html'">
✕
</div>
</header>

<!-- MAIN CONTAINER -->
<div id="main-content">

<!-- HERO SECTION -->
<section class="hero">
<div class="hero-box">
<h1 class="hero-title">
📌 <span class="accent">Pinterest Downloader</span>
</h1>
<p class="hero-desc">
Cari wallpaper anime, aesthetic, gaming, cartoon dan download dengan resolusi HD kualitas terbaik gratis ✨
</p>
</div>
</section>

<!-- SEARCH AREA SECTION -->
<section class="search-area">
<div class="search-card">
<div class="label">
🔎 Search Sesuai keinginan 
</div>
<input
type="text"
class="input"
id="searchInput"
placeholder="Contoh : anime girl aesthetic"
>
<button
class="search-btn"
id="searchBtn"
>
🚀 SEARCH IMAGE
</button>
</div>
</section>

<!-- LOADER -->
<div class="loader" id="loader">
<div class="spinner"></div>
<p>Searching Image...</p>
</div>

<!-- RESULTS ELEMENT CONTAINER -->
<div class="results" id="results"></div>

<!-- FOOTER -->
<div class="footer">
<div class="footer-brand">RafaXMods</div>
<div class="footer-text">
© 2026 RafaXMods — Dukung kami dengan join Saluran WhatsApp & Telegram
</div>
</div>

</div>

<!-- MODAL POPUP VIEW OVERLAY -->
<div class="modal" id="modal">
<img src="" id="modalImg">
<div class="modal-actions">
<button
class="modal-btn btn-download"
id="modalDownload"
>
⬇ DOWNLOAD
</button>
<button
class="modal-btn btn-close"
onclick="closeModal()"
>
✖ CLOSE
</button>
</div>
</div>

<!-- FLOATING BACK TO TOP BUTTON -->
<button class="fab" onclick="scrollToTop()">
▲
</button>

<!-- CORE SCRIPT (Tetap Utuh) -->
<script>
const API = 'https://api-faa.my.id/faa/pinterest?q=';

const searchBtn = document.getElementById('searchBtn');
const searchInput = document.getElementById('searchInput');
const results = document.getElementById('results');
const loader = document.getElementById('loader');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const modalDownload = document.getElementById('modalDownload');

let currentImage = '';

async function searchPinterest(){
const query = searchInput.value.trim();
if(!query){
showNotif('⚠ Masukkan kata kunci dulu');
return;
}

results.innerHTML = '';
loader.style.display = 'block';

try{
const res = await fetch(API + encodeURIComponent(query));
const data = await res.json();
loader.style.display = 'none';

if(data.status && data.result.length){
data.result.forEach((img)=>{
createCard(img);
});
showNotif('✅ ' + data.result.length + ' image ditemukan');

setTimeout(()=>{
results.scrollIntoView({
behavior:'smooth'
});
},300);

}else{
showNotif('❌ Tidak ada hasil');
}
}catch(error){
loader.style.display = 'none';
showNotif('❌ Server error');
}
}

function createCard(url){
const card = document.createElement('div');
card.className = 'pin-card';
card.innerHTML = `
<img src="${url}" class="pin-img" loading="lazy">
<div class="overlay">
<button class="download-btn" onclick="event.stopPropagation();downloadImage('${url}')">
⬇ DOWNLOAD
</button>
</div>
`;
card.onclick = ()=>openModal(url);
results.appendChild(card);
}

function openModal(url){
currentImage = url;
modalImg.src = url;
modal.classList.add('active');
}

function closeModal(){
modal.classList.remove('active');
}

async function downloadImage(url){
showNotif('⬇ Downloading...');
try{
const response = await fetch(url);
const blob = await response.blob();
const blobUrl = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = blobUrl;
a.download = 'pinterest_' + Date.now() + '.jpg';
document.body.appendChild(a);
a.click();
a.remove();
URL.revokeObjectURL(blobUrl);
showNotif('✅ Download berhasil!');
}catch{
window.open(url,'_blank');
showNotif('📂 Dibuka manual');
}
}

modalDownload.onclick = ()=>{
downloadImage(currentImage);
};

function showNotif(text){
const notif = document.createElement('div');
notif.className = 'notification';
notif.innerHTML = text;
document.body.appendChild(notif);
setTimeout(()=>{
notif.remove();
},2200);
}

function scrollToTop(){
window.scrollTo({
top:0,
behavior:'smooth'
});
}

searchBtn.onclick = searchPinterest;
searchInput.addEventListener('keypress', e=>{
if(e.key === 'Enter'){
searchPinterest();
}
});

modal.addEventListener('click', e=>{
if(e.target === modal){
closeModal();
}
});
</script>

</body>
</html>
