<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6f4e37">
<title>Search Pinterest</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg1:#2b1811;
--bg2:#4e342e;
--bg3:#6d4c41;
--bg4:#3e2723;

--milk:#d7b19d;
--orange:#ff9f5a;
--orange2:#ff7b42;
--white:#fff8f3;
--shadow:#1b0d08;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Baloo 2',cursive;
}

body{
background:
radial-gradient(circle at top,#6d4c41 0%,#3e2723 40%,#2b1811 100%);
min-height:100vh;
overflow-x:hidden;
color:white;
}

/* SCROLL */

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#ff9f5a;
border-radius:20px;
}

/* HEADER */

header{
padding:18px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:23px;
font-weight:800;
text-shadow:4px 4px 0px #3b1d14;
}

.back-btn{
width:50px;
height:50px;
border-radius:18px;
border:4px solid white;
background:linear-gradient(135deg,#ffb36b,#ff8447);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:white;
box-shadow:6px 6px 0px #b63d10;
cursor:pointer;
transition:.2s;
}

.back-btn:active{
transform:scale(.95);
}

/* HERO */

.hero{
padding:5px 18px 0;
text-align:center;
}

.hero-box{
background:rgba(255,255,255,.08);
border:5px solid white;
border-radius:35px;
padding:25px 18px;
box-shadow:10px 10px 0px #1f0f09;
backdrop-filter:blur(8px);
}

.hero-title{
font-size:30px;
font-weight:800;
line-height:1.1;
text-shadow:5px 5px 0px #402018;
}

.hero-desc{
margin-top:10px;
font-size:16px;
color:#f8ddd0;
}

/* SEARCH */

.search-area{
padding:22px 18px;
}

.search-card{
background:rgba(255,255,255,.08);
border:4px solid white;
border-radius:30px;
padding:18px;
box-shadow:10px 10px 0px #1f0f09;
}

.label{
font-size:20px;
font-weight:700;
margin-bottom:10px;
text-shadow:3px 3px 0px #402018;
}

.input{
width:100%;
height:54px;
border-radius:20px;
border:4px solid white;
background:#4a2418;
padding:0 16px;
font-size:17px;
color:white;
outline:none;
box-shadow:6px 6px 0px #1f0f09;
}

.input::placeholder{
color:#d0b0a1;
}

.search-btn{
margin-top:16px;
width:100%;
height:54px;
border:none;
border-radius:22px;
background:linear-gradient(135deg,#ffb15f,#ff7c45);
border:4px solid white;
font-size:18px;
font-weight:800;
color:white;
cursor:pointer;
box-shadow:7px 7px 0px #c74214;
transition:.2s;
}

.search-btn:active{
transform:translateY(4px);
box-shadow:3px 3px 0px #c74214;
}

/* LOADER */

.loader{
display:none;
text-align:center;
padding:25px;
}

.spinner{
width:52px;
height:52px;
border:6px solid rgba(255,255,255,.2);
border-top:6px solid #ffb15f;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loader p{
margin-top:12px;
font-size:17px;
font-weight:700;
}

/* RESULTS */

.results{
column-count:2;
column-gap:14px;
padding:0 18px 100px;
}

@media(min-width:700px){
.results{
column-count:3;
}
}

.pin-card{
position:relative;
margin-bottom:14px;
break-inside:avoid;
border-radius:24px;
overflow:hidden;
border:4px solid white;
background:#4a2418;
box-shadow:8px 8px 0px #1f0f09;
animation:show .3s ease;
}

@keyframes show{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:none;
}
}

.pin-img{
width:100%;
display:block;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,
rgba(0,0,0,.75),
transparent 55%);
display:flex;
align-items:flex-end;
justify-content:center;
padding:12px;
opacity:0;
transition:.2s;
}

.pin-card:hover .overlay{
opacity:1;
}

.download-btn{
height:40px;
padding:0 14px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#ffb15f,#ff7c45);
border:3px solid white;
font-size:14px;
font-weight:800;
color:white;
cursor:pointer;
box-shadow:4px 4px 0px #c74214;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
padding:20px;
z-index:999;
}

.modal.active{
display:flex;
}

.modal img{
max-width:92%;
max-height:70vh;
border-radius:25px;
border:5px solid white;
box-shadow:10px 10px 0px #1f0f09;
}

.modal-actions{
margin-top:20px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

.modal-btn{
height:50px;
padding:0 18px;
border:none;
border-radius:18px;
border:4px solid white;
font-size:16px;
font-weight:800;
cursor:pointer;
color:white;
}

.btn-download{
background:linear-gradient(135deg,#ffb15f,#ff7c45);
box-shadow:6px 6px 0px #c74214;
}

.btn-close{
background:#5a3429;
box-shadow:6px 6px 0px #2d140d;
}

/* FAB */

.fab{
position:fixed;
bottom:18px;
right:18px;
width:56px;
height:56px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#ffb15f,#ff7c45);
border:4px solid white;
font-size:20px;
font-weight:800;
color:white;
cursor:pointer;
box-shadow:6px 6px 0px #c74214;
z-index:50;
}

/* NOTIFICATION */

.notification{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#4a2418;
border:4px solid white;
padding:10px 18px;
border-radius:18px;
font-size:15px;
font-weight:700;
box-shadow:7px 7px 0px #1f0f09;
z-index:9999;
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateX(-50%) translateY(-20px);
}
to{
opacity:1;
transform:translateX(-50%) translateY(0);
}
}

</style>
</head>
<body>

<header>

<div class="back-btn">
🔙
</div>

<div class="logo">
Search Wallpaper/pp
</div>

</header>

<section class="hero">

<div class="hero-box">

<div class="hero-title">
📌 PINTEREST DOWNLOADER
</div>

<div class="hero-desc">
Cari wallpaper anime, aesthetic, gaming, cartoon dan download ✨
</div>

</div>

</section>

<section class="search-area">

<div class="search-card">

<div class="label">
🔎 Search Sesuai keinginan 
</div>

<input
type="text"
class="input"
id="searchInput"
placeholder="Contoh : anime girl"
>

<button
class="search-btn"
id="searchBtn"
>
🚀 SEARCH IMAGE
</button>

</div>

</section>

<div class="loader" id="loader">

<div class="spinner"></div>

<p>Searching Image...</p>

</div>

<div class="results" id="results"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<img src="" id="modalImg">

<div class="modal-actions">

<button
class="modal-btn btn-download"
id="modalDownload"
>
⬇ DOWNLOAD
</button>

<button
class="modal-btn btn-close"
onclick="closeModal()"
>
✖ CLOSE
</button>

</div>

</div>

<button class="fab" onclick="scrollToTop()">
⬆
</button>

<script>

const API =
'https://api-faa.my.id/faa/pinterest?q=';

const searchBtn =
document.getElementById('searchBtn');

const searchInput =
document.getElementById('searchInput');

const results =
document.getElementById('results');

const loader =
document.getElementById('loader');

const modal =
document.getElementById('modal');

const modalImg =
document.getElementById('modalImg');

const modalDownload =
document.getElementById('modalDownload');

let currentImage = '';

async function searchPinterest(){

const query =
searchInput.value.trim();

if(!query){

showNotif(
'⚠ Masukkan kata kunci dulu'
);

return;

}

results.innerHTML = '';

loader.style.display = 'block';

try{

const res =
await fetch(
API + encodeURIComponent(query)
);

const data =
await res.json();

loader.style.display = 'none';

if(data.status && data.result.length){

data.result.forEach((img)=>{

createCard(img);

});

showNotif(
'✅ ' +
data.result.length +
' image ditemukan'
);

setTimeout(()=>{

results.scrollIntoView({
behavior:'smooth'
});

},300);

}else{

showNotif(
'❌ Tidak ada hasil'
);

}

}catch(error){

loader.style.display = 'none';

showNotif(
'❌ Server error'
);

}

}

function createCard(url){

const card =
document.createElement('div');

card.className =
'pin-card';

card.innerHTML = `

<img
src="${url}"
class="pin-img"
loading="lazy"
>

<div class="overlay">

<button
class="download-btn"
onclick="event.stopPropagation();downloadImage('${url}')"
>
⬇ DOWNLOAD
</button>

</div>

`;

card.onclick =
()=>openModal(url);

results.appendChild(card);

}

function openModal(url){

currentImage = url;

modalImg.src = url;

modal.classList.add('active');

}

function closeModal(){

modal.classList.remove('active');

}

async function downloadImage(url){

showNotif('⬇ Downloading...');

try{

const response =
await fetch(url);

const blob =
await response.blob();

const blobUrl =
URL.createObjectURL(blob);

const a =
document.createElement('a');

a.href = blobUrl;

a.download =
'pinterest_' +
Date.now() +
'.jpg';

document.body.appendChild(a);

a.click();

a.remove();

URL.revokeObjectURL(blobUrl);

showNotif(
'✅ Download berhasil!'
);

}catch{

window.open(url,'_blank');

showNotif(
'📂 Dibuka manual'
);

}

}

modalDownload.onclick =
()=>{

downloadImage(currentImage);

};

function showNotif(text){

const notif =
document.createElement('div');

notif.className =
'notification';

notif.innerHTML =
text;

document.body.appendChild(notif);

setTimeout(()=>{

notif.remove();

},2200);

}

function scrollToTop(){

window.scrollTo({
top:0,
behavior:'smooth'
});

}

searchBtn.onclick =
searchPinterest;

searchInput.addEventListener(
'keypress',
e=>{

if(e.key === 'Enter'){

searchPinterest();

}

}
);

modal.addEventListener(
'click',
e=>{

if(e.target === modal){

closeModal();

}

}
);

</script>

</body>
</html>
