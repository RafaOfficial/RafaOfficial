<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.container{
max-width:430px;
margin:20px auto;
background:#1b1b1b;
padding:20px;
border-radius:20px;
}

.item{
background:#2d2d2d;
padding:12px;
border-radius:12px;
margin-top:10px;
word-break:break-word;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
background:linear-gradient(45deg,#7b2ff7,#f107a3);
color:white;
font-size:15px;
cursor:pointer;
font-weight:bold;
}

.copy{
background:#444;
}

.copy2{
background:#555;
}

.success{
background:linear-gradient(45deg,#00c853,#64dd17);
}
</style>
</head>
<body>

<div class="container">

<h1>⚡ Website Admin</h1>

<div id="orders"></div>

<button onclick="resetRiwayat()">
🗑️ Reset Riwayat
</button>

<button onclick="window.location.href='rch.html'">
⬅️ Kembali Ke User
</button>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDNWHQT0D16TMy9XQ0p0wYh42QwrvPFzaE",
authDomain: "reachchsystem-2d934.firebaseapp.com",
databaseURL: "https://reachchsystem-2d934-default-rtdb.asia-southeast1.firebasedatabase.app/",
projectId: "reachchsystem-2d934",
storageBucket: "reachchsystem-2d934.firebasestorage.app",
messagingSenderId: "1020994564198",
appId: "1:1020994564198:web:1cf23aeb506ed136dc7da7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function loadOrders(){

db.ref('orders').on('value', snap=>{

let html='';

snap.forEach(data=>{

let item = data.val();
let id = data.key;

html += `

<div class="item">

<b>📢 Link Saluran:</b><br>
${item.link}

<button class="copy"
onclick="copyLink('${item.link}')">

📋 Copy Link Saluran

</button>

<br><br>

<b>😍 Emoji:</b><br>
${item.emoji}

<button class="copy2"
onclick="copyEmoji('${item.emoji}')">

📋 Copy Emoji

</button>

<br><br>

<b>Status:</b>
${item.status}

<button class="success"
onclick="sukses('${id}')">

✅ Sukses

</button>

</div>

`;

});

document.getElementById('orders').innerHTML = html;

});

}

function copyLink(link){

navigator.clipboard.writeText(link);

alert('Link saluran berhasil di copy!');

}

function copyEmoji(emoji){

navigator.clipboard.writeText(emoji);

alert('Emoji berhasil di copy!');

}

function sukses(id){

db.ref('orders/'+id).update({
status:'success'
});

alert('Pesanan berhasil di sukseskan!');

}

function resetRiwayat(){

if(confirm('Yakin reset semua riwayat?')){

db.ref('orders').remove();

alert('Riwayat berhasil di reset!');

}

}

loadOrders();

</script>

</body>
</html>
