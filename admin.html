<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.container{
max-width:430px;
margin:20px auto;
background:#1b1b1b;
padding:20px;
border-radius:20px;
}

.item{
background:#2d2d2d;
padding:12px;
border-radius:12px;
margin-top:10px;
word-break:break-word;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
background:linear-gradient(45deg,#7b2ff7,#f107a3);
color:white;
font-size:15px;
cursor:pointer;
font-weight:bold;
}

.copy{
background:#444;
}

.copy2{
background:#555;
}

.success{
background:linear-gradient(45deg,#00c853,#64dd17);
}

/* ========================= */
/* RATE LIMIT */
/* ========================= */

.rl-box{
background:#2d2d2d;
padding:16px;
border-radius:12px;
margin-top:10px;
text-align:center;
}

.rl-label{
font-size:13px;
color:#aaa;
font-weight:bold;
margin-bottom:6px;
}

.rl-angka{
font-size:40px;
font-weight:900;
color:white;
}

.rl-sub{
font-size:11px;
color:#666;
margin-top:4px;
}

.rl-input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
background:#2d2d2d;
color:white;
font-size:15px;
font-weight:bold;
outline:none;
box-sizing:border-box;
}

.rl-input::placeholder{
color:#666;
}

.btn-tambah{
background:linear-gradient(45deg,#00c853,#64dd17);
}

.btn-set{
background:linear-gradient(45deg,#ff6d00,#ffab00);
}

hr.divider{
border:none;
border-top:2px solid #333;
margin:16px 0;
}
</style>
</head>
<body>

<div class="container">

<h1>⚡ Website Admin</h1>

<!-- ========================= -->
<!-- RATE LIMIT SECTION -->
<!-- ========================= -->

<div class="rl-box">

<div class="rl-label">
🎯 Rate Limit Saat Ini
</div>

<div class="rl-angka" id="sisaKuota">
⏳
</div>

<div class="rl-sub">
otomatis sinkron ke rch.html
</div>

</div>

<input
class="rl-input"
type="number"
id="jumlahInput"
placeholder="Masukkan angka (misal: 5)"
min="0">

<button
class="btn-tambah"
onclick="tambahRateLimit()">
➕ Tambah Rate Limit
</button>

<button
class="btn-set"
onclick="setRateLimit()">
✏️ Set Rate Limit Manual
</button>

<hr class="divider">

<!-- ========================= -->
<!-- ORDERS -->
<!-- ========================= -->

<div id="orders"></div>

<button onclick="resetRiwayat()">
🗑️ Reset Riwayat
</button>

<button onclick="window.location.href='rch.html'">
⬅️ Kembali Ke User
</button>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDNWHQT0D16TMy9XQ0p0wYh42QwrvPFzaE",
authDomain: "reachchsystem-2d934.firebaseapp.com",
databaseURL: "https://reachchsystem-2d934-default-rtdb.asia-southeast1.firebasedatabase.app/",
projectId: "reachchsystem-2d934",
storageBucket: "reachchsystem-2d934.firebasestorage.app",
messagingSenderId: "1020994564198",
appId: "1:1020994564198:web:1cf23aeb506ed136dc7da7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ========================= */
/* LOAD RATE LIMIT REALTIME */
/* ========================= */

db.ref('limit').on('value', snap=>{

let sisa = snap.val();

if(sisa === null) sisa = 0;

const el = document.getElementById('sisaKuota');

el.textContent = sisa + '×';

el.style.color =
sisa > 0 ? '#64dd17' : '#ff1744';

});

/* ========================= */
/* TAMBAH RATE LIMIT */
/* ========================= */

function tambahRateLimit(){

const val =
parseInt(
document.getElementById(
'jumlahInput'
).value.trim()
);

if(!val || val < 1){
alert('⚠️ Masukkan angka minimal 1!');
return;
}

db.ref('limit').once('value', snap=>{

let sisa = snap.val();
if(sisa === null) sisa = 0;

const baru = sisa + val;

db.ref('limit').set(baru);

alert(
'✅ Rate limit ditambah!\n' +
'Sekarang: ' + baru + '×'
);

document.getElementById(
'jumlahInput'
).value = '';

});

}

/* ========================= */
/* SET RATE LIMIT MANUAL */
/* ========================= */

function setRateLimit(){

const val =
parseInt(
document.getElementById(
'jumlahInput'
).value.trim()
);

if(isNaN(val) || val < 0){
alert('⚠️ Masukkan angka yang valid (min 0)!');
return;
}

db.ref('limit').set(val);

alert(
'✅ Rate limit diset ke ' + val + '×'
);

document.getElementById(
'jumlahInput'
).value = '';

}

/* ========================= */
/* LOAD ORDERS */
/* ========================= */

function loadOrders(){

db.ref('orders').on('value', snap=>{

let html='';

snap.forEach(data=>{

let item = data.val();
let id = data.key;

html += `

<div class="item">

<b>📢 Link Saluran:</b><br>
${item.link}

<button class="copy"
onclick="copyLink('${item.link}')">

📋 Copy Link Saluran

</button>

<br><br>

<b>😍 Emoji:</b><br>
${item.emoji}

<button class="copy2"
onclick="copyEmoji('${item.emoji}')">

📋 Copy Emoji

</button>

<br><br>

<b>Status:</b>
${item.status}

<button class="success"
onclick="sukses('${id}')">

✅ Sukses

</button>

</div>

`;

});

document.getElementById('orders').innerHTML = html;

});

}

function copyLink(link){
navigator.clipboard.writeText(link);
alert('Link saluran berhasil di copy!');
}

function copyEmoji(emoji){
navigator.clipboard.writeText(emoji);
alert('Emoji berhasil di copy!');
}

function sukses(id){
db.ref('orders/'+id).update({status:'success'});
alert('Pesanan berhasil di sukseskan!');
}

function resetRiwayat(){
if(confirm('Yakin reset semua riwayat?')){
db.ref('orders').remove();
alert('Riwayat berhasil di reset!');
}
}

loadOrders();

</script>

</body>
</html>
