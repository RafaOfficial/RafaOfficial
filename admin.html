<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.container{
max-width:430px;
margin:20px auto;
background:#1b1b1b;
padding:20px;
border-radius:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.item{
background:#2d2d2d;
padding:12px;
border-radius:12px;
margin-top:12px;
word-break:break-word;
border:1px solid #444;
}

.status{
padding:6px 10px;
border-radius:8px;
font-size:13px;
display:inline-block;
margin-top:10px;
}

.pending{
background:orange;
color:black;
}

.success{
background:lime;
color:black;
}

.cancel{
background:red;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
background:linear-gradient(45deg,#7b2ff7,#f107a3);
color:white;
font-size:15px;
cursor:pointer;
font-weight:bold;
}

.copy{
background:#444;
}

.successBtn{
background:linear-gradient(45deg,#00c853,#64dd17);
}

.cancelBtn{
background:linear-gradient(45deg,#ff1744,#ff5252);
}

textarea{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:10px;
background:#1a1a1a;
color:white;
resize:none;
box-sizing:border-box;
}

.reason{
margin-top:10px;
padding:10px;
background:#1a1a1a;
border-radius:10px;
color:#ff8a8a;
}

.follow{
margin-top:10px;
padding:10px;
background:#151515;
border-radius:10px;
font-size:14px;
color:#00bfff;
}
</style>
</head>
<body>

<div class="container">

<h1>⚡ Website Admin</h1>

<div id="orders"></div>

<button onclick="resetRiwayat()">
🗑️ Reset Riwayat
</button>

<button onclick="window.location.href='rch.html'">
⬅️ Kembali Ke User
</button>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDNWHQT0D16TMy9XQ0p0wYh42QwrvPFzaE",
authDomain: "reachchsystem-2d934.firebaseapp.com",
databaseURL: "https://reachchsystem-2d934-default-rtdb.asia-southeast1.firebasedatabase.app/",
projectId: "reachchsystem-2d934",
storageBucket: "reachchsystem-2d934.firebasedatabase.app",
messagingSenderId: "1020994564198",
appId: "1:1020994564198:web:1cf23aeb506ed136dc7da7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function loadOrders(){

db.ref('orders').on('value', snap=>{

let html='';

snap.forEach(data=>{

let item = data.val();
let id = data.key;

html += `

<div class="item">

<b>📢 Link Saluran</b><br>
${item.link}

<button class="copy"
onclick="copyLink('${item.link}')">

📋 Copy Link Saluran

</button>

<br><br>

<b>😍 Emoji</b><br>
${item.emoji}

<button class="copy"
onclick="copyEmoji('${item.emoji}')">

📋 Copy Emoji

</button>

<br>

<div class="status ${
item.status === 'success'
? 'success'
: item.status === 'cancel'
? 'cancel'
: 'pending'
}">

${
item.status === 'success'
? '✅ SUCCESS'
: item.status === 'cancel'
? '❌ CANCEL'
: '🕓 PENDING'
}

</div>

${
item.alasan
? `
<div class="reason">
<b>📌 Alasan:</b><br>
${item.alasan}
</div>
`
: ''
}

<div class="follow">
⚠️ Jangan lupa follow saluran Telegram sebelum proses reach.
</div>

<textarea id="reason-${id}"
placeholder="Ajukan alasan sendiri..."></textarea>

<button class="successBtn"
onclick="sukses('${id}')">

✅ Sukses

</button>

<button class="cancelBtn"
onclick="cancelOrder('${id}')">

❌ Cancel + Ajukan Alasan

</button>

</div>

`;

});

document.getElementById('orders').innerHTML = html;

});

}

function copyLink(link){

navigator.clipboard.writeText(link);

alert('Link saluran berhasil di copy!');

}

function copyEmoji(emoji){

navigator.clipboard.writeText(emoji);

alert('Emoji berhasil di copy!');

}

function sukses(id){

db.ref('orders/' + id).update({
status:'success',
alasan:''
});

alert('Pesanan berhasil disukseskan!');

}

function cancelOrder(id){

let alasan = document.getElementById('reason-' + id).value;

if(alasan.trim() === ''){

alert('Masukkan alasan cancel terlebih dahulu!');

return;

}

db.ref('orders/' + id).update({
status:'cancel',
alasan: alasan
});

alert('Pesanan berhasil dicancel!');

}

function resetRiwayat(){

if(confirm('Yakin reset semua riwayat?')){

db.ref('orders').remove();

alert('Riwayat berhasil direset!');

}

}

loadOrders();

</script>

</body>
</html>
