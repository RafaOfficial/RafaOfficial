<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suntik Followers TikTok</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
padding:15px;
}

.container{
max-width:430px;
margin:auto;
background:#1b1b1b;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,0,255,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2a2a2a;
color:white;
outline:none;
margin-top:12px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
background:linear-gradient(45deg,#7b2ff7,#f107a3);
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.profile{
background:#222;
padding:15px;
border-radius:15px;
margin-top:20px;
text-align:center;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid #f107a3;
}

.card{
background:#222;
padding:15px;
border-radius:15px;
margin-top:15px;
}

.hidden{
display:none;
}

.logout{
background:red;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.loader{
width:70px;
height:70px;
border:6px solid #333;
border-top:6px solid #f107a3;
border-radius:50%;
animation:putar 1s linear infinite;
}

@keyframes putar{
100%{
transform:rotate(360deg);
}
}
</style>
</head>
<body>

<div class="container">

<h1>⚡ Suntik Followers TikTok</h1>

<div id="loginBox">

<input type="text"
id="username"
placeholder="Masukkan Username TikTok">

<button onclick="cekTiktok()">
🔍 Cari Akun TikTok
</button>

</div>

<div id="resultBox" class="hidden">

<div class="profile">

<img id="pp">

<h2 id="nama"></h2>

<p id="followers"></p>
<p id="following"></p>
<p id="likes"></p>

<p id="bio"></p>

</div>

<div class="card">

<h3>🔥 Pilih Paket Followers</h3>

<button onclick="pilihPaket('1000 Followers','5000')">
1000 Followers - Rp5.000
</button>

<button onclick="pilihPaket('5000 Followers','15000')">
5000 Followers - Rp15.000
</button>

<button onclick="pilihPaket('10000 Followers','30000')">
10000 Followers - Rp30.000
</button>

</div>

<button class="logout"
onclick="logout()">

🚪 Logout

</button>

</div>

</div>

<script>

async function cekTiktok(){

let user =
document.getElementById('username').value.trim();

if(user == ''){
alert('Masukkan username TikTok!');
return;
}

localStorage.setItem('tt_user', user);

document.body.innerHTML += `
<div class="loading" id="loading">

<div class="loader"></div>

<p style="margin-top:20px;">
🔍 Sedang mencari akun TikTok...
</p>

</div>
`;

try{

const res = await fetch(
'https://www.tikwm.com/api/user/info?unique_id=' + user
);

const json = await res.json();

document.getElementById('loading').remove();

if(!json.data){
alert('Akun TikTok tidak ditemukan!');
return;
}

const u = json.data.user;
const s = json.data.stats;

document.getElementById('loginBox')
.classList.add('hidden');

document.getElementById('resultBox')
.classList.remove('hidden');

document.getElementById('pp').src =
u.avatar;

document.getElementById('nama').innerText =
'@' + u.unique_id;

document.getElementById('followers').innerText =
'👥 Followers : ' + s.followerCount;

document.getElementById('following').innerText =
'❤️ Mengikuti : ' + s.followingCount;

document.getElementById('likes').innerText =
'👍 Likes : ' + s.heart;

document.getElementById('bio').innerText =
u.signature || 'Tidak ada bio';

localStorage.setItem(
'tiktok_data',
JSON.stringify({
username:u.unique_id,
avatar:u.avatar,
followers:s.followerCount,
following:s.followingCount,
likes:s.heart,
bio:u.signature || ''
})
);

}catch(err){

console.log(err);

alert('Gagal mengambil data TikTok!');

}

}

function pilihPaket(paket,harga){

document.body.innerHTML += `
<div class="loading" id="loading2">

<div class="loader"></div>

<p style="margin-top:20px;">
🚀 Melanjutkan pembayaran...
</p>

</div>
`;

const data =
JSON.parse(localStorage.getItem('tiktok_data'));

localStorage.setItem(
'order_data',
JSON.stringify({
username:data.username,
pp:data.avatar,
paket:paket,
harga:harga
})
);

setTimeout(()=>{

window.location.href='payment.html';

},2000);

}

function logout(){

localStorage.clear();

location.reload();

}

window.onload = ()=>{

let saved =
localStorage.getItem('tt_user');

if(saved){

document.getElementById('username').value =
saved;

cekTiktok();

}

}

</script>

</body>
</html>
