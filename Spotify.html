<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Play</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    width: 90%;
    max-width: 400px;
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  h2 {
    text-align: center;
    margin-bottom: 15px;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 10px;
  }

  button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #16a34a;
  }

  .result {
    margin-top: 20px;
    display: none;
  }

  img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .info {
    font-size: 14px;
    line-height: 1.6;
  }

  audio {
    width: 100%;
    margin-top: 10px;
  }

  .download {
    display: block;
    text-align: center;
    margin-top: 10px;
    background: #3b82f6;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
  }

.btn-back {
  display: inline-block;
  padding: 12px 20px;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
  transition: 0.3s;
}

</style>
</head>

<body>

<div class="container">
   <a href="index.html" class="btn-back">⬅ Back</a>
  <h2>🎧 Spotify Play</h2>

  <input type="text" id="query" placeholder="Cari lagu...">
  <button onclick="search()">Cari</button>

  <div class="result" id="result">
    <img id="thumb">

    <div class="info" id="info"></div>

    <audio id="audio" controls></audio>

    <a id="download" class="download" target="_blank">⬇ Download MP3</a>
  </div>
</div>

<script>
function formatNumber(num) {
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

async function search() {
  let q = document.getElementById("query").value;
  if (!q) return alert("Masukkan judul lagu!");

  try {
    let res = await fetch(`https://api.nexray.web.id/downloader/spotifyplay?q=${encodeURIComponent(q)}`);
    let json = await res.json();

    if (!json.status) {
      alert("Lagu tidak ditemukan!");
      return;
    }

    let v = json.result;

    document.getElementById("result").style.display = "block";

    document.getElementById("thumb").src = v.thumbnail;

    document.getElementById("info").innerHTML = `
      <b>🎧 Title:</b> ${v.title}<br>
      <b>🎤 Artist:</b> ${v.artist}<br>
      <b>💿 Album:</b> ${v.album}<br>
      <b>🕰️ Duration:</b> ${v.duration}<br>
      <b>🔥 Popular:</b> ${formatNumber(v.popularity)}<br>
      <b>📅 Release:</b> ${v.release_at}
    `;

    document.getElementById("audio").src = v.download_url;
    document.getElementById("download").href = v.download_url;

  } catch (e) {
    alert("❌ Gagal mengambil lagu");
    console.error(e);
  }
}
</script>

</body>
</html>
