<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5b7cfa">

<title>Unlimited Email Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
    scroll-behavior:smooth;
}

.title,.popup-box h3{
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#05060d;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    overflow-x:hidden;
    position:relative;
    color:#f4f6ff;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(ellipse 60% 40% at 50% 0%,rgba(91,124,250,.28),transparent 60%),
    radial-gradient(ellipse 70% 45% at 15% 55%,rgba(60,80,200,.16),transparent 60%),
    radial-gradient(ellipse 70% 45% at 85% 90%,rgba(91,124,250,.20),transparent 60%);
    z-index:-1;
}

/* BACKGROUND */

.circle1{
    position:fixed;
    width:380px;
    height:380px;
    border-radius:50%;
    background:rgba(91,124,250,.18);
    top:-120px;
    left:-120px;
    filter:blur(90px);
    z-index:-1;
}

.circle2{
    position:fixed;
    width:420px;
    height:420px;
    border-radius:50%;
    background:rgba(124,147,255,.16);
    bottom:-150px;
    right:-150px;
    filter:blur(100px);
    z-index:-1;
}

/* FLOAT ICON */

.float{
    position:absolute;
    color:#a5b4ff;
    opacity:.25;
    font-size:24px;
    animation:float 4s ease-in-out infinite;
}

.f1{
    top:12%;
    left:10%;
}

.f2{
    bottom:18%;
    right:12%;
    animation-delay:1s;
}

.f3{
    top:40%;
    right:18%;
    animation-delay:2s;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* CARD */

.card{
    width:100%;
    max-width:390px;
    background:linear-gradient(160deg,#10142c,#0a0d1f);
    border:1px solid rgba(255,255,255,.07);
    border-radius:28px;
    padding:20px;
    box-shadow:
    0 20px 60px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.04);
    position:relative;
    z-index:2;
}

/* LOGO */

.logo{
    width:75px;
    height:75px;
    margin:auto;
    background:linear-gradient(145deg,#1a2044,#0e1230);
    border-radius:20px;
    border:1px solid rgba(124,147,255,.35);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    box-shadow:0 0 20px rgba(91,124,250,.25);
    margin-bottom:15px;
}

/* TITLE */

.title{
    text-align:center;
    color:#f4f6ff;
    font-size:24px;
    font-weight:700;
}

.desc{
    text-align:center;
    font-size:12px;
    color:#8b93b8;
    margin-top:8px;
    line-height:1.5;
}

/* BUTTON */

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:18px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    margin-top:12px;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}

.generate{
    background:linear-gradient(145deg,#5b7cfa,#324adf);
    color:#ffffff;
    border:1px solid rgba(124,147,255,.4);
    box-shadow:0 8px 24px rgba(91,124,250,.4);
}

.generate:hover{
    box-shadow:0 12px 28px rgba(91,124,250,.55);
}

.copy{
    background:linear-gradient(160deg,#161c3c,#0d1128);
    color:#f4f6ff;
    border:1px solid rgba(124,147,255,.35);
    box-shadow:0 0 20px rgba(91,124,250,.2);
}

.copy:hover{
    box-shadow:0 10px 26px rgba(91,124,250,.35);
}

.back{
    background:linear-gradient(160deg,#161c3c,#0d1128);
    color:#f4f6ff;
    border:1px solid rgba(124,147,255,.35);
    box-shadow:0 0 20px rgba(91,124,250,.2);
}

/* LOADING */

.loading{
    display:none;
    margin-top:15px;
    background:linear-gradient(160deg,#10142c,#0a0d1f);
    border:1px solid rgba(124,147,255,.3);
    box-shadow:0 0 20px rgba(91,124,250,.2);
    padding:15px;
    border-radius:18px;
    text-align:center;
    color:#c7d1ff;
    font-weight:600;
}

.loader{
    width:40px;
    height:40px;
    border:5px solid rgba(124,147,255,.2);
    border-top:5px solid #5b7cfa;
    border-radius:50%;
    margin:auto;
    margin-bottom:10px;
    animation:spin 1s linear infinite;
}

@keyframes spin{

    0%{
        transform:rotate(0deg);
    }

    100%{
        transform:rotate(360deg);
    }

}

/* RESULT */

#result{
    margin-top:15px;
    max-height:230px;
    overflow:auto;
}

#result::-webkit-scrollbar{
    width:5px;
}

#result::-webkit-scrollbar-thumb{
    background:#5b7cfa;
    border-radius:20px;
}

.item{
    background:linear-gradient(160deg,#10142c,#0a0d1f);
    color:#f4f6ff;
    padding:13px;
    border-radius:16px;
    margin-bottom:10px;
    font-size:12px;
    font-weight:600;
    border:1px solid rgba(255,255,255,.07);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    word-break:break-word;
    transition:.3s;
}

.item:hover{
    border-color:rgba(124,147,255,.5);
    box-shadow:0 8px 20px rgba(91,124,250,.25);
}

/* POPUP */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(2,3,10,.8);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:99;
    padding:15px;
}

.popup-box{
    width:100%;
    max-width:320px;
    background:linear-gradient(160deg,#10142c,#070a18);
    border:1px solid rgba(124,147,255,.3);
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:
    0 0 60px rgba(91,124,250,.3),
    0 20px 60px rgba(0,0,0,.6);
    animation:popup .3s ease;
}

@keyframes popup{

    from{
        opacity:0;
        transform:scale(.8);
    }

    to{
        opacity:1;
        transform:scale(1);
    }

}

.popup-logo{
    width:70px;
    height:70px;
    margin:auto;
    background:linear-gradient(145deg,#1a2044,#0e1230);
    border-radius:18px;
    border:1px solid rgba(124,147,255,.35);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    box-shadow:0 0 18px rgba(91,124,250,.5);
    margin-bottom:15px;
}

.popup-box h3{
    color:#f4f6ff;
    font-size:20px;
    margin-bottom:10px;
    font-weight:700;
}

.popup-box p{
    color:#8b93b8;
    font-size:12px;
    line-height:1.5;
}

.join{
    background:linear-gradient(145deg,#5b7cfa,#324adf);
    color:#ffffff;
    border:1px solid rgba(124,147,255,.4);
    box-shadow:0 8px 24px rgba(91,124,250,.4);
}

.join:hover{
    box-shadow:0 12px 28px rgba(91,124,250,.55);
}

.done{
    background:linear-gradient(160deg,#161c3c,#0d1128);
    color:#f4f6ff;
    border:1px solid rgba(124,147,255,.35);
    box-shadow:0 0 20px rgba(91,124,250,.2);
}

.footer{
    text-align:center;
    color:#8b93b8;
    font-size:10px;
    margin-top:15px;
}

/* BACK BUTTON */

.back-wrap{
    margin-bottom:12px;
}

.back-btn{
    width:62px;
    height:62px;
    background:linear-gradient(145deg,#1a2044,#0e1230);
    border-radius:18px;
    border:1px solid rgba(124,147,255,.35);
    box-shadow:0 0 20px rgba(91,124,250,.25);
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 26px rgba(91,124,250,.4);
}

.back-inner{
    width:40px;
    height:40px;
    background:linear-gradient(145deg,#5b7cfa,#324adf);
    border-radius:12px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:700;
    border:1px solid rgba(124,147,255,.4);
}

.back-inner span{
    font-size:8px;
    margin-top:-2px;
}

.arrow{
    font-size:18px;
    line-height:14px;
}

</style>
</head>
<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="float f1">✦</div>
<div class="float f2">⚡</div>
<div class="float f3">✦</div>

<div class="card">

<!-- BACK -->

<div class="back-wrap">

<a href="index.html" class="back-btn">

<div class="back-inner">

<div class="arrow">⬅</div>

<span>BACK</span>

</div>

</a>

</div>

<div class="logo">
📧
</div>

<div class="title">
Unlimited Email
</div>

<div class="desc">
Generate email tanpa batas dengan design Dark Cartoon Brutalism tema coklat susu cerah.
</div>

<button class="generate" onclick="checkJoin()">
✨ Generate Email
</button>

<div class="loading" id="loading">

<div class="loader"></div>

⏳ Membuat Email...

</div>

<div id="result"></div>

<button class="copy" onclick="copyAll()">
📋 Copy Semua
</button>

<div class="footer">
© Rafa Official • Brutalism UI
</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<div class="popup-logo">
🚀
</div>

<h3>Join Telegram</h3>

<p>
Silakan join Telegram terlebih dahulu untuk menggunakan fitur ini.
</p>

<button
class="join"
id="joinBtn"
onclick="joinTele()">

📢 Join Telegram

</button>

<button
class="done"
id="doneBtn"
onclick="closePopup()"
style="display:none;">

✅ Sudah Join

</button>

</div>
</div>

<script>

let emails = [];
let joined = false;

/* RANDOM EMAIL */

function randomEmail(){

    let chars =
    "abcdefghijklmnopqrstuvwxyz1234567890";

    let name = "";

    for(let i=0;i<10;i++){

        name +=
        chars[Math.floor(Math.random()*chars.length)];

    }

    return name + "@gmail.com";

}

/* CHECK JOIN */

function checkJoin(){

    if(!joined){

        document.getElementById("popup").style.display =
        "flex";

        return;

    }

    generate();

}

/* GENERATE */

function generate(){

    const loading =
    document.getElementById("loading");

    loading.style.display =
    "block";

    loading.scrollIntoView({
        behavior:"smooth"
    });

    setTimeout(()=>{

        let email =
        randomEmail();

        emails.push(email);

        let div =
        document.createElement("div");

        div.className =
        "item";

        div.innerText =
        email;

        document
        .getElementById("result")
        .prepend(div);

        loading.style.display =
        "none";

        div.scrollIntoView({
            behavior:"smooth",
            block:"center"
        });

    },1200);

}

/* JOIN TELEGRAM */

function joinTele(){

    window.open(
    "https://t.me/ErroBaiyles",
    "_blank"
    );

    document.getElementById("doneBtn").style.display =
    "block";

}

/* CLOSE POPUP */

function closePopup(){

    joined = true;

    document.getElementById("popup").style.display =
    "none";

    generate();

}

/* COPY */

function copyAll(){

    if(emails.length === 0){

        return alert("❌ Belum ada email!");

    }

    navigator.clipboard.writeText(
        emails.join("\n")
    );

    alert("✅ Semua email berhasil di copy!");

}

/* BACK */

function goBack(){

    window.location.href =
    "index.html";

}

</script>

</body>
</html>
