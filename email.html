<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlimited Email Generator</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:400px;
    background:#1a1a1a;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,0,150,0.15);
}

.title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.desc{
    font-size:13px;
    opacity:0.7;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#7b2ff7,#f107a3);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:6px;
}

.loading{
    display:none;
    text-align:center;
    margin-top:10px;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0.3;}
}

#result{
    margin-top:15px;
    max-height:220px;
    overflow:auto;
}

.item{
    background:#222;
    padding:10px;
    border-radius:10px;
    margin-bottom:8px;
    font-size:13px;
}

.copy{
    background:#333;
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    text-align:center;
    width:85%;
    max-width:300px;
    animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

.popup-box h3{
    margin-bottom:10px;
}

.popup-box p{
    font-size:13px;
    opacity:0.7;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div class="card">
    <div class="title">✨ Generate Email</div>

    <div class="desc">
        Generate email tanpa batas (unlimited).
    </div>

    <button onclick="checkJoin()">✨ Generate Email</button>

    <div class="loading" id="loading">⏳ Membuat email...</div>

    <div id="result"></div>

    <button class="copy" onclick="copyAll()">Copy Semua</button>

    <button onclick="goBack()">⬅️ Kembali</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>Wajib Join Telegram</h3>
        <p>Silakan join saluran Telegram terlebih dahulu untuk menggunakan fitur ini.</p>

        <button id="joinBtn" onclick="joinTele()">Join Telegram</button>
        <button id="doneBtn" onclick="closePopup()" style="display:none;">Sudah Join</button>
    </div>
</div>

<script>
let emails = [];
let joined = false;

function randomEmail(){
    let chars = "abcdefghijklmnopqrstuvwxyz1234567890";
    let name = "";
    for(let i=0;i<10;i++){
        name += chars[Math.floor(Math.random()*chars.length)];
    }
    return name + "@gmail.com";
}

function checkJoin(){
    if(!joined){
        document.getElementById("popup").style.display = "flex";
        return;
    }
    generate();
}

function generate(){
    document.getElementById("loading").style.display = "block";

    setTimeout(()=>{
        let email = randomEmail();
        emails.push(email);

        let div = document.createElement("div");
        div.className = "item";
        div.innerText = email;

        document.getElementById("result").prepend(div);

        document.getElementById("loading").style.display = "none";
    },500);
}

function joinTele(){
    window.open("https://t.me/ErroBaiyles", "_blank"); // GANTI LINK TELEGRAM

    // tampilkan tombol "Sudah Join"
    document.getElementById("doneBtn").style.display = "block";
}

function closePopup(){
    joined = true;
    document.getElementById("popup").style.display = "none";
    generate();
}

function copyAll(){
    if(emails.length === 0) return alert("Belum ada email!");
    navigator.clipboard.writeText(emails.join("\n"));
    alert("Semua email berhasil di copy!");
}

function goBack(){
    window.location.href = "index.js"; // ubah kalau mau ke index.html
}
</script>

</body>
</html>
