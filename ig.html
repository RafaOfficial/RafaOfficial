<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6d4c41">
<title>IG Downloader - Rafa Official</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#4a2f23;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
color:#fff;
}

.topbar{
width:100%;
max-width:600px;
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}

.back-circle{
width:64px;
height:64px;
min-width:64px;
border-radius:18px;
background:linear-gradient(145deg,#ff9248,#e8730f);
border:4px solid #fff;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:4px 4px 0 rgba(0,0,0,0.35);
font-weight:900;
color:#fff;
font-size:11px;
line-height:1.1;
text-align:center;
}

.back-circle .arrow{
font-size:20px;
display:block;
}

.brand-name{
font-size:26px;
font-weight:900;
color:#fff;
text-shadow:2px 2px 0 rgba(0,0,0,0.3);
}

.container{
width:100%;
max-width:600px;
background:#a9785f;
border:4px solid #fff;
border-radius:25px;
padding:25px;
box-shadow:8px 8px 0 rgba(0,0,0,0.35);
}

.logo{
text-align:center;
font-size:32px;
font-weight:900;
color:#fff7ef;
margin-bottom:10px;
text-shadow:3px 3px 0 rgba(0,0,0,0.25);
}

.desc{
text-align:center;
color:#f3e3d6;
margin-bottom:20px;
font-weight:600;
}

.input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:15px;
background:#fdf3ea;
border:3px dashed #e8730f;
color:#3b2a24;
font-size:15px;
margin-bottom:15px;
font-weight:600;
}

.input::placeholder{
color:#a9785f;
}

.btn{
width:100%;
padding:15px;
border:none;
cursor:pointer;
border-radius:15px;
font-weight:900;
font-size:16px;
margin-top:10px;
background:linear-gradient(145deg,#ff9248,#e8730f);
color:white;
border:3px solid #fff;
box-shadow:5px 5px 0 rgba(0,0,0,0.35);
transition:.2s;
}

.btn:hover{
transform:translateY(-2px);
}

.back{
display:none;
}

.loading{
display:none;
text-align:center;
margin-top:20px;
}

.loader{
width:60px;
height:60px;
margin:auto;
border:6px solid #6d4c41;
border-top:6px solid #ff9248;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.result{
display:none;
margin-top:20px;
background:#8d6452;
padding:15px;
border-radius:15px;
border:3px solid #fff;
}

video{
width:100%;
border-radius:15px;
margin-bottom:15px;
border:3px solid #e8730f;
}

.info{
background:#fdf3ea;
color:#3b2a24;
padding:12px;
border-radius:12px;
margin-bottom:12px;
font-weight:600;
}

.info p{
margin:5px 0;
word-break:break-word;
}

.download-btn{
display:none;
text-decoration:none;
text-align:center;
padding:14px;
background:linear-gradient(145deg,#ff9248,#e8730f);
color:white;
font-weight:900;
border-radius:15px;
border:3px solid #fff;
box-shadow:5px 5px 0 rgba(0,0,0,0.35);
}

.footer{
margin-top:20px;
text-align:center;
font-size:13px;
color:#f3e3d6;
font-weight:600;
}
</style>

</head>
<body>

<div style="width:100%;max-width:600px;">

<div class="topbar">
<div class="back-circle" onclick="location.href='index.html'">
<span class="arrow">&#8592;</span>
<span>BACK</span>
</div>
<div class="brand-name">RafaXMods</div>
</div>

<div class="container">

<div class="logo">📥 IG Downloader</div>

<div class="desc">
Downloader Instagram Reels, Post & Story
</div>

<input
type="text"
id="url"
class="input"
placeholder="Masukkan URL Instagram">

<button class="btn" onclick="executeIG()">
⚡ EXECUTE IG
</button>

<button class="btn back" onclick="location.href='index.html'">
⬅ BACK
</button>

<div class="loading" id="loading">
<div class="loader"></div>
<p style="margin-top:10px;">
Mengambil data...
</p>
</div>

<div class="result" id="result">

<video
id="video"
controls
playsinline> </video>

<div class="info">
<p id="username">Username: -</p>
<p id="likes">❤ 0</p>
<p id="comments">💬 0</p>
<p id="caption">Caption: -</p>
</div>

<a
id="downloadLink"
class="download-btn"
download>
⬇ DOWNLOAD VIDEO </a>

</div>

<div class="footer">
Dark Cartoon Brutalism • Rafa Official
</div>

</div>
</div>

<script>
async function executeIG(){
    const url = document.getElementById("url").value.trim();

    if(!url){
        alert("Masukkan URL Instagram!");
        return;
    }

    const loading = document.getElementById("loading");
    const result = document.getElementById("result");
    const video = document.getElementById("video");
    const download = document.getElementById("downloadLink");

    loading.style.display = "block";
    result.style.display = "none";
    download.style.display = "none";

    try {
        // Menggunakan Endpoint API Baru
        const api = `https://api.azbry.com/api/download/instagramv2?url=${encodeURIComponent(url)}`;

        const response = await fetch(api);
        const data = await response.json();

        // Validasi response JSON baru
        if(!data.status || !data.url || data.url.length === 0){
            throw new Error("Gagal mengambil data.");
        }

        // Ambil URL video dari array objek pertama
        const videoUrl = data.url[0].url;

        video.src = videoUrl;
        download.href = videoUrl;

        // Tampilkan Metadata baru
        document.getElementById("username").innerText = 
            "Username: @" + (data.meta.username || "-");

        document.getElementById("likes").innerText = 
            "❤ " + (data.meta.like_count ? Number(data.meta.like_count).toLocaleString('id-ID') : "0");

        document.getElementById("comments").innerText = 
            "💬 " + (data.meta.comment_count ? Number(data.meta.comment_count).toLocaleString('id-ID') : "0");

        document.getElementById("caption").innerText = 
            "Caption: " + (data.meta.title || "-");

        download.style.display = "block";
        result.style.display = "block";

    } catch(error) {
        alert(
            "Gagal mengambil video.\n\nPastikan URL benar. Jika API eksternal mengalami kendala CORS, Anda mungkin membutuhkan proxy server."
        );
        console.log(error);
    }

    loading.style.display = "none";
}
</script>

</body>
</html>
