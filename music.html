<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6f4e37">

<title>Music Search RafaXMods</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg1:#4b2415;
--bg2:#1a0c07;
--card:#b08d80;
--white:#ffffff;
--orange:#ff9d4d;
--orange2:#ff8533;
--shadow:#4b1d09;
--text:#fff7f1;
}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:
radial-gradient(circle at top,
#6a341d 0%,
#2d140c 40%,
#120704 100%);
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

/* APP */

.app-container{
width:100%;
max-width:430px;
height:100vh;
background:
linear-gradient(
145deg,
rgba(70,30,15,.98),
rgba(20,8,5,.98)
);
border-left:8px solid white;
border-right:8px solid white;
box-shadow:
15px 15px 0 rgba(30,10,5,.8);
overflow:hidden;
position:relative;
}

/* HEADER */

header{
padding:18px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:6px solid white;
background:
linear-gradient(
145deg,
#4f2615,
#2a120b
);
box-shadow:
0 8px 0 rgba(0,0,0,.3);
}

/* BACK BUTTON */

.icon-btn{
width:68px;
height:68px;
border-radius:24px;
background:
linear-gradient(
145deg,
#ffb66d,
#ff8c3b
);
border:6px solid white;
box-shadow:
0 9px 0 #bf4f00;
display:flex;
align-items:center;
justify-content:center;
font-size:1.4rem;
color:white;
text-decoration:none;
transition:.2s;
flex-shrink:0;
}

.icon-btn:active{
transform:translateY(4px);
box-shadow:
0 3px 0 #bf4f00;
}

/* TITLE */

.header-title{
flex:1;
text-align:center;
font-size:2rem;
font-weight:900;
color:white;
text-shadow:
5px 5px 0 rgba(0,0,0,.25);
letter-spacing:1px;
}

/* MAIN */

.main-content{
height:calc(100vh - 100px);
overflow-y:auto;
padding:22px;
padding-bottom:220px;
}

/* SEARCH */

.glass-card{
background:#b19082;
border:7px solid white;
border-radius:35px;
padding:18px;
box-shadow:
12px 12px 0 rgba(40,15,5,.9);
margin-bottom:25px;
}

.input-group{
display:flex;
gap:12px;
}

.input-box{
flex:1;
height:68px;
background:#2b120b;
border:5px solid white;
border-radius:24px;
padding:0 20px;
font-size:1.1rem;
font-weight:700;
color:white;
outline:none;
box-shadow:
0 6px 0 #170804;
}

.input-box::placeholder{
color:#f7dcca;
}

.search-btn{
width:80px;
height:68px;
border:none;
border-radius:24px;
background:
linear-gradient(
145deg,
#ffb66d,
#ff8d3b
);
border:5px solid white;
box-shadow:
0 8px 0 #bf4f00;
font-size:1.5rem;
color:white;
cursor:pointer;
flex-shrink:0;
}

.search-btn:active{
transform:translateY(4px);
box-shadow:
0 3px 0 #bf4f00;
}

/* SONG LIST */

.song-list{
display:flex;
flex-direction:column;
gap:24px;
}

/* SONG ITEM */

.song-item{
background:#b08f81;
border:7px solid white;
border-radius:38px;
padding:16px;
display:flex;
align-items:center;
gap:16px;
box-shadow:
12px 12px 0 rgba(35,12,6,.9);
transition:.2s;
overflow:hidden;
}

.song-item.active{
background:#c19a88;
}

.song-item:active{
transform:scale(.98);
}

/* IMAGE */

.song-img{
width:88px;
height:88px;
border-radius:26px;
object-fit:cover;
border:5px solid white;
flex-shrink:0;
}

/* INFO */

.song-info{
flex:1;
overflow:hidden;
min-width:0;
}

.song-title{
font-size:1.6rem;
font-weight:900;
color:white;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
text-shadow:
4px 4px 0 rgba(0,0,0,.25);
}

.song-artist{
font-size:1rem;
font-weight:600;
margin-top:4px;
color:#fff0e3;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* PLAY BUTTON */

.song-action{
width:84px;
height:84px;
border-radius:26px;
background:
linear-gradient(
145deg,
#ffb76e,
#ff8b39
);
border:6px solid white;
box-shadow:
0 8px 0 #bf4f00;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.song-action i{
font-size:2rem;
color:white;
}

/* MINI PLAYER */

.mini-player{
position:absolute;
left:50%;
bottom:18px;
transform:translateX(-50%) translateY(200px);
width:92%;
background:#b08b7b;
border:8px solid white;
border-radius:42px;
padding:16px;
display:flex;
align-items:center;
gap:14px;
box-shadow:
12px 12px 0 rgba(35,10,5,.9);
transition:.35s;
z-index:999;
}

.mini-player.active{
transform:translateX(-50%) translateY(0);
}

/* PLAYER IMG */

.mp-img{
width:74px;
height:74px;
border-radius:24px;
border:5px solid white;
object-fit:cover;
flex-shrink:0;
animation:spin 5s linear infinite;
animation-play-state:paused;
}

.mp-img.playing{
animation-play-state:running;
}

/* INFO */

.mp-info{
flex:1;
overflow:hidden;
min-width:0;
}

.mp-title{
font-size:1.2rem;
font-weight:900;
color:white;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
text-shadow:
3px 3px 0 rgba(0,0,0,.25);
}

.mp-artist{
font-size:.95rem;
color:#fff0e1;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* CONTROLS */

.mp-controls{
display:flex;
align-items:center;
gap:12px;
flex-shrink:0;
}

.mp-btn,
.mp-dl{
width:68px;
height:68px;
border-radius:22px;
background:
linear-gradient(
145deg,
#ffb56d,
#ff8b39
);
border:5px solid white;
box-shadow:
0 8px 0 #bf4f00;
display:flex;
align-items:center;
justify-content:center;
font-size:1.5rem;
color:white;
text-decoration:none;
cursor:pointer;
}

.mp-btn:active,
.mp-dl:active{
transform:translateY(4px);
box-shadow:
0 3px 0 #bf4f00;
}

/* LOADING */

.status-msg{
text-align:center;
padding:50px 10px;
font-size:1rem;
font-weight:700;
color:#ffe6d7;
}

.loading-spinner{
font-size:2rem;
animation:spin 1s linear infinite;
}

/* TOAST */

.toast{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ffb56d;
padding:14px 24px;
border-radius:20px;
border:4px solid white;
box-shadow:
0 6px 0 #bf4f00;
font-weight:700;
color:white;
display:none;
z-index:9999;
}

/* ANIMATION */

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* MOBILE */

@media(max-width:768px){

body{
padding:0;
}

.app-container{
max-width:100%;
height:100vh;
border-radius:0;
border-left:none;
border-right:none;
}

.song-title{
font-size:1.3rem;
}

.song-img{
width:78px;
height:78px;
}

.song-action{
width:74px;
height:74px;
}

.song-action i{
font-size:1.6rem;
}

.mp-btn,
.mp-dl{
width:60px;
height:60px;
font-size:1.3rem;
}

}

/* SCROLL */

.main-content::-webkit-scrollbar{
width:5px;
}

.main-content::-webkit-scrollbar-thumb{
background:#ff9d4d;
border-radius:10px;
}

</style>
</head>

<body>

<div class="app-container">

<header>

<a href="index.html" class="icon-btn">
<i class="fa-solid fa-arrow-left"></i>
</a>

<div class="header-title">
🎵 MUSIC
</div>

<div style="width:68px"></div>

</header>

<div class="main-content">

<div class="glass-card">

<div class="input-group">

<input
type="text"
class="input-box"
id="search-input"
placeholder="Cari lagu..."
>

<button
class="search-btn"
onclick="searchMusic()"
>
<i class="fa-solid fa-search"></i>
</button>

</div>

</div>

<div id="loading" class="status-msg" style="display:none">

<i class="fa-solid fa-circle-notch loading-spinner"></i>

<p style="margin-top:10px">
Scanning Music...
</p>

</div>

<div class="song-list" id="song-list">

<div class="status-msg">
Cari lagu favorit kamu 🎵
</div>

</div>

</div>

<!-- MINI PLAYER -->

<div class="mini-player" id="mini-player">

<img
src="https://via.placeholder.com/150"
class="mp-img"
id="mp-img"
>

<div class="mp-info">

<div class="mp-title" id="mp-title">
No Song
</div>

<div class="mp-artist" id="mp-artist">
...
</div>

</div>

<div class="mp-controls">

<button
class="mp-btn"
onclick="togglePlay()"
>
<i class="fa-solid fa-play" id="play-icon"></i>
</button>

<a
href="#"
class="mp-dl"
id="mp-dl"
download
target="_blank"
>

<i class="fa-solid fa-download"></i>

</a>

</div>

<audio id="audio-player"></audio>

</div>

<div class="toast" id="toast"></div>

</div>

<script>

const audio =
document.getElementById('audio-player');

const mpImg =
document.getElementById('mp-img');

const playIcon =
document.getElementById('play-icon');

function toast(msg){

const t =
document.getElementById('toast');

t.innerText = msg;

t.style.display = "block";

setTimeout(()=>{
t.style.display = "none";
},2500);

}

async function searchMusic(){

const query =
document.getElementById('search-input')
.value
.trim();

const list =
document.getElementById('song-list');

const loading =
document.getElementById('loading');

if(!query)
return toast("Masukkan nama lagu!");

list.innerHTML = "";
loading.style.display = "block";

try{

const res =
await fetch(
`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=15`
);

const data =
await res.json();

loading.style.display = "none";

if(data.resultCount === 0){

list.innerHTML =
`<div class="status-msg">Lagu tidak ditemukan</div>`;

return;

}

data.results.forEach(song=>{

const artwork =
song.artworkUrl100
? song.artworkUrl100.replace('100x100','500x500')
: 'https://via.placeholder.com/300';

const card =
document.createElement('div');

card.className = "song-item";

card.innerHTML = `

<img src="${artwork}" class="song-img">

<div class="song-info">

<div class="song-title">
${song.trackName}
</div>

<div class="song-artist">
${song.artistName}
</div>

</div>

<div class="song-action">

<i class="fa-solid fa-play"></i>

</div>

`;

card.onclick = ()=>{

document
.querySelectorAll('.song-item')
.forEach(el=>el.classList.remove('active'));

card.classList.add('active');

playSong(
song.previewUrl,
song.trackName,
song.artistName,
artwork
);

};

list.appendChild(card);

});

}catch(err){

loading.style.display = "none";

list.innerHTML =
`<div class="status-msg">Error mengambil lagu</div>`;

}

}

document
.getElementById('search-input')
.addEventListener('keypress',e=>{

if(e.key === "Enter")
searchMusic();

});

function playSong(url,title,artist,img){

if(!url)
return toast("Preview tidak tersedia");

const player =
document.getElementById('mini-player');

document.getElementById('mp-title').innerText =
title;

document.getElementById('mp-artist').innerText =
artist;

document.getElementById('mp-img').src =
img;

document.getElementById('mp-dl').href =
url;

audio.src = url;

audio.play();

player.classList.add('active');

playIcon.className =
"fa-solid fa-pause";

mpImg.classList.add('playing');

}

function togglePlay(){

if(audio.paused){

audio.play();

playIcon.className =
"fa-solid fa-pause";

mpImg.classList.add('playing');

}else{

audio.pause();

playIcon.className =
"fa-solid fa-play";

mpImg.classList.remove('playing');

}

}

audio.onended = ()=>{

playIcon.className =
"fa-solid fa-play";

mpImg.classList.remove('playing');

};

</script>

</body>
</html>
