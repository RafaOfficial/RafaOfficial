<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encrypt JS Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<!-- CDN BARU (ANTI ERROR) -->
<script src="https://cdn.jsdelivr.net/npm/javascript-obfuscator/dist/index.browser.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 420px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(128,0,255,0.3);
}

h2 {
  text-align: center;
  color: #c084fc;
}

input, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

input {
  background: #1e1b4b;
  color: white;
}

button {
  background: #7c3aed;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #a855f7;
}

.output {
  margin-top: 10px;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  font-size: 12px;
  max-height: 150px;
  overflow: auto;
}
</style>
</head>

<body>

<div class="container">
  <h2>⚡ JS Encrypt Tool</h2>

  <input type="file" id="file" accept=".js">
  <input type="text" id="key" placeholder="text1|text2">

  <button onclick="encrypt()">Encrypt</button>

  <div class="output" id="out">Menunggu...</div>

  <button onclick="download()">Download</button>
</div>

<script>
let hasil = "";

// ENCRYPT FUNCTION (ANTI ERROR)
async function encrypt() {
  try {
    const file = document.getElementById("file").files[0];
    const key = document.getElementById("key").value;

    if (!file) return alert("❌ Upload file dulu");
    if (!key.includes("|")) return alert("❌ Format text1|text2");

    const [t1, t2] = key.split("|");

    const reader = new FileReader();

    reader.onload = function(e) {
      try {
        const code = e.target.result;

        document.getElementById("out").innerText = "⚡ Encrypting...";

        const obfuscated = JavaScriptObfuscator.obfuscate(code, {
          compact: true,
          controlFlowFlattening: true,
          deadCodeInjection: true,
          stringArrayEncoding: ['base64'],
          identifierNamesGenerator: 'mangled',
          renameGlobals: true
        });

        hasil = obfuscated.getObfuscatedCode();

        document.getElementById("out").innerText =
          hasil.substring(0, 500) + "...";
      } catch (err) {
        alert("❌ Error encrypt: " + err.message);
      }
    };

    reader.readAsText(file);

  } catch (err) {
    alert("❌ Error: " + err.message);
  }
}

// DOWNLOAD
function download() {
  if (!hasil) return alert("❌ Belum ada hasil");

  const blob = new Blob([hasil], { type: "application/javascript" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "encrypted.js";
  a.click();
}
</script>

</body>
</html>
