<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Encrypt Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<!-- CDN FIX -->
<script src="https://unpkg.com/js-confuser@latest/dist/index.browser.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 400px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

h2 {
  text-align: center;
  color: #c084fc;
}

input, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

input {
  background: #1e1b4b;
  color: white;
}

button {
  background: #7c3aed;
  color: white;
  font-weight: bold;
}

.output {
  margin-top: 10px;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  font-size: 12px;
  max-height: 120px;
  overflow: auto;
}
</style>
</head>

<body>

<div class="container">
  <h2>⚡ JS Encrypt</h2>

  <input type="file" id="file" accept=".js">
  <input type="text" id="key" placeholder="text1|text2">

  <button onclick="runEncrypt()">Encrypt</button>

  <div class="output" id="out">Menunggu...</div>

  <button onclick="download()">Download</button>
</div>

<script>
let hasil = "";

// tunggu library siap
function waitJsConfuser() {
  return new Promise((resolve, reject) => {
    let check = setInterval(() => {
      if (window.JsConfuser) {
        clearInterval(check);
        resolve();
      }
    }, 100);

    setTimeout(() => {
      reject("JsConfuser gagal load");
    }, 5000);
  });
}

async function runEncrypt() {
  try {
    document.getElementById("out").innerText = "⏳ Loading...";

    await waitJsConfuser();

    const file = document.getElementById("file").files[0];
    const key = document.getElementById("key").value;

    if (!file) return alert("Upload file dulu");
    if (!key.includes("|")) return alert("Format salah");

    const [t1, t2] = key.split("|");

    const reader = new FileReader();
    reader.onload = async function(e) {
      try {
        let code = e.target.result;

        document.getElementById("out").innerText = "⚡ Encrypting...";

        const result = await window.JsConfuser.obfuscate(code, {
          target: "browser",
          compact: true,
          renameVariables: true,
          stringEncoding: true,
          identifierGenerator: () =>
            `高宝座${t1}${t2}` + Math.random().toString(36).slice(2)
        });

        hasil = result.code || result;

        document.getElementById("out").innerText =
          hasil.substring(0, 500) + "...";
      } catch (err) {
        alert("❌ Encrypt Error: " + err.message);
      }
    };

    reader.readAsText(file);

  } catch (err) {
    alert("❌ " + err);
  }
}

function download() {
  if (!hasil) return alert("Belum ada hasil");

  const blob = new Blob([hasil], { type: "application/javascript" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "encrypted.js";
  a.click();
}
</script>

</body>
</html>
