<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORE RAFAXMODS PREMIUM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
background:radial-gradient(circle at top,#1a0025,#000);
color:white;
overflow:hidden;
}

/* ⭐ STAR */
.star{
position:fixed;
width:2px;height:2px;
background:#c084fc;
border-radius:50%;
opacity:0.8;
box-shadow:0 0 10px #a855f7;
animation:floatStar 5s ease-in-out infinite alternate;
}
@keyframes floatStar{
0%{transform:translateY(0)}
100%{transform:translateY(-10px)}
}

/* 🌠 METEOR */
.meteor{
position:fixed;
width:2px;height:120px;
background:linear-gradient(#a855f7,transparent);
transform:rotate(45deg);
animation:meteor 1s linear;
}
@keyframes meteor{
to{transform:translate(-600px,600px) rotate(45deg);opacity:0}
}

/* INTRO */
#intro{
position:fixed;
width:100%;height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.92);
z-index:10;
}

/* BUTTON PREMIUM */
.btn{
padding:14px 38px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#7c3aed,#ec4899);
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 25px #7c3aed;
transition:0.3s;
margin:8px;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 50px #a855f7;
}

/* WARNING BOX */
#warningBox,#joinBox{
display:none;
text-align:center;
}

/* LOADING 3D */
#loading{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
}

.loader3d{
width:70px;
height:70px;
border-radius:50%;
border:4px solid #a855f7;
border-top:4px solid transparent;
animation:spin 1s linear infinite;
box-shadow:0 0 25px #a855f7;
margin-bottom:15px;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* LIGHTNING */
.lightning{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
animation:flash 1.5s infinite;
}

@keyframes flash{
0%,90%,100%{background:transparent}
92%{background:rgba(168,85,247,0.15)}
94%{background:rgba(255,255,255,0.2)}
}

/* BAR */
.percent{
font-size:40px;
color:#c084fc;
text-shadow:0 0 15px #a855f7;
margin-top:10px;
}

.bar{
width:250px;height:6px;
background:#111;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#7c3aed,#ec4899);
}

/* MAIN */
#main{
display:none;
height:100vh;
overflow:auto;
padding:20px;
background:radial-gradient(circle,#12001f,#050005);
text-align:center;
}

/* LOGO */
.logo{
width:140px;height:140px;
border-radius:50%;
border:4px solid #a855f7;
box-shadow:0 0 30px #a855f7;
margin-bottom:10px;
}

.name{
font-size:26px;
font-weight:bold;
color:#e9d5ff;
text-shadow:0 0 10px #a855f7;
}

.check{
background:#a855f7;
border-radius:50%;
padding:4px 7px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:15px;
}

.card{
background:linear-gradient(145deg,#12001f,#1e0033);
padding:18px;
border-radius:16px;
text-decoration:none;
color:white;
box-shadow:0 0 20px #7c3aed;
transition:0.3s;
border:1px solid rgba(168,85,247,0.3);
}

.card:hover{
transform:scale(1.06);
box-shadow:0 0 35px #a855f7;
}
</style>
</head>

<body>

<audio id="bgm" loop>
<source src="https://files.catbox.moe/3kq8s7.mp3">
</audio>

<!-- INTRO -->
<div id="intro">

<button class="btn" id="btnStart" onclick="warningStep()">🚀 Lanjutkan</button>

<div id="warningBox">
  <h2 style="color:#c084fc">⚠ PERINGATAN</h2>
  <p style="margin:10px;color:#ddd">
    Harus join WhatsApp Channel dulu
  </p>
  <button class="btn" onclick="toWA()">📢 Join WhatsApp</button>
</div>

<div id="joinBox">
  <h2 style="color:#a855f7">✔ Sudah Join?</h2>
  <button class="btn" onclick="startLoading()">🚀 Masuk Website</button>
</div>

<div id="loading">
  <div class="loader3d"></div>
  <div class="lightning"></div>
  <div class="percent" id="percent">0%</div>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

</div>

<!-- MAIN -->
<div id="main">

<h1 style="color:#c084fc;text-shadow:0 0 15px #a855f7">WEBSITE PREMIUM SULTAN</h1>

<img class="logo" src="https://files.catbox.moe/t0cf7r.jpeg">

<div class="name">RafaXMods <span class="check">✔</span></div>

<p>✨ Pilih layanan premium</p>

<div class="container">
<a href="#" class="card">🛒 List Jualan</a>
<a href="#" class="card">🎧 Music</a>
<a href="#" class="card">🎵 Spotify</a>
<a href="#" class="card">🎵 TikTok DL</a>
<a href="#" class="card">📸 Fake iPhone</a>
<a href="#" class="card">✨ Wallpaper</a>
<a href="#" class="card">💫 Fake Story</a>
<a href="#" class="card">❄ HD Image</a>
</div>

</div>

<script>

// STAR
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

// METEOR
setInterval(()=>{
let m=document.createElement("div");
m.className="meteor";
m.style.left=Math.random()*100+"vw";
document.body.appendChild(m);
setTimeout(()=>m.remove(),1000);
},600);

// STEP 1
function warningStep(){
document.getElementById("btnStart").style.display="none";
document.getElementById("warningBox").style.display="block";
}

// STEP 2 WA
function toWA(){
window.open("https://whatsapp.com/channel/0029Vb6SHOA0AgWEzwzBK41S", "_blank");
document.getElementById("warningBox").style.display="none";
document.getElementById("joinBox").style.display="block";
}

// STEP 3 LOADING
function startLoading(){
document.getElementById("joinBox").style.display="none";
document.getElementById("loading").style.display="flex";

document.getElementById("bgm").play().catch(()=>{});

let p=0;
let percent=document.getElementById("percent");
let fill=document.getElementById("fill");

let int=setInterval(()=>{
p+=Math.random()*7;

if(p>=100){
p=100;
clearInterval(int);
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
document.body.style.overflow="auto";
},500);
}

percent.innerText=Math.floor(p)+"%";
fill.style.width=p+"%";

},100);
}

</script>

</body>
</html>
