<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORE RAFAXMODS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
background:#000;
color:white;
overflow:hidden;
}

/* ⭐ BINTANG */
.star{
position:fixed;
width:2px;height:2px;
background:white;
border-radius:50%;
opacity:0.7;
animation:floatStar 4s ease-in-out infinite alternate;
}
@keyframes floatStar{
0%{transform:translateY(0)}
100%{transform:translateY(-8px)}
}

/* 🌠 METEOR */
.meteor{
position:fixed;
width:2px;height:100px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:meteor 1s linear;
}
@keyframes meteor{
to{transform:translate(-500px,500px) rotate(45deg);opacity:0}
}

/* INTRO */
#intro{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
background:rgba(0,0,0,0.95);
flex-direction:column;
}

/* BUTTON */
.btn{
padding:14px 35px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#9333ea,#ec4899);
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 25px #9333ea;
margin:10px;
transition:0.3s;
}
.btn:hover{
transform:scale(1.08);
box-shadow:0 0 45px #ec4899;
}

/* WA PANEL */
#waPanel{
display:none;
flex-direction:column;
align-items:center;
}

.join{
background:#25D366;
color:black;
}

.check{
background:#00a2ff;
color:white;
}

.enter{
background:#ff00ff;
color:white;
display:none;
}

/* LOADING */
#loading{
display:none;
flex-direction:column;
align-items:center;
}

.percent{
font-size:40px;
margin:10px;
text-shadow:0 0 20px #9333ea;
}

.bar{
width:250px;height:6px;
background:#111;
border-radius:10px;
overflow:hidden;
}
.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#9333ea,#ec4899);
}

/* MAIN */
#main{
display:none;
padding:20px;
overflow:auto;
height:100vh;
background:#0b0014;
text-align:center;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgm" loop>
<source src="https://files.catbox.moe/3kq8s7.mp3">
</audio>

<!-- INTRO -->
<div id="intro">

<!-- STEP 1 -->
<button class="btn" id="lanjutBtn" onclick="showWA()">🚀 LANJUTKAN</button>

<!-- STEP 2 WA PANEL -->
<div id="waPanel">

<h3 style="margin-bottom:10px;text-align:center;">
⚠ JOIN CHANNEL WA DULU
</h3>

<a href="https://whatsapp.com/channel/0029Vb6SHOA0AgWEzwzBK41S" target="_blank">
<button class="btn join" onclick="showCheck()">JOIN CHANNEL WA</button>
</a>

<button class="btn check" id="checkBtn" onclick="checkJoin()" style="display:none;">
✔ CHECK JOIN
</button>

<button class="btn enter" id="enterBtn" onclick="start()">
➡ MASUK WEBSITE
</button>

</div>

<!-- LOADING -->
<div id="loading">
<div class="percent" id="percent">0%</div>
<div class="bar"><div class="fill" id="fill"></div></div>
<br>
<button class="btn" onclick="showMain()">⏭ Skip</button>
</div>

</div>

<!-- MAIN -->
<div id="main">

<h1 style="color:#ff00ff;text-shadow:0 0 15px #ff00ff;">
WEBSITE JUALAN
</h1>

</div>

<script>

// ⭐ STAR
for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

// 🌠 METEOR
setInterval(()=>{
let m=document.createElement("div");
m.className="meteor";
m.style.left=Math.random()*100+"vw";
m.style.top="0";
document.body.appendChild(m);
setTimeout(()=>m.remove(),1000);
},700);

// STEP 1: klik LANJUTKAN
function showWA(){
document.getElementById("lanjutBtn").style.display="none";
document.getElementById("waPanel").style.display="flex";
}

// STEP 2: setelah klik WA
function showCheck(){
setTimeout(()=>{
document.getElementById("checkBtn").style.display="inline-block";
},500);
}

// STEP 3: CHECK JOIN
function checkJoin(){
localStorage.setItem("wa_joined","true");

document.getElementById("enterBtn").style.display="inline-block";

alert("✔ Join berhasil, silahkan masuk website");
}

// STEP 4: START WEBSITE
function start(){

if(localStorage.getItem("wa_joined")!=="true"){
alert("⚠ Harus join & check dulu!");
return;
}

document.querySelectorAll(".btn").forEach(b=>b.style.display="none");
document.getElementById("loading").style.display="flex";

document.getElementById("bgm").play().catch(()=>{});

let p=0;
let percent=document.getElementById("percent");
let fill=document.getElementById("fill");

let int=setInterval(()=>{
p+=Math.random()*6;

if(p>=100){
p=100;
clearInterval(int);
setTimeout(showMain,500);
}

percent.innerText=Math.floor(p)+"%";
fill.style.width=p+"%";

},100);
}

// SHOW MAIN
function showMain(){
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
document.body.style.overflow="auto";
}

</script>

</body>
</html>
