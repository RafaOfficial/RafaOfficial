<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORE RAFAXMODS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
background:#000;
color:white;
overflow:hidden;
}

/* ⭐ BINTANG */
.star{
position:fixed;
width:2px;height:2px;
background:white;
border-radius:50%;
opacity:0.7;
animation:floatStar 4s ease-in-out infinite alternate;
}
@keyframes floatStar{
0%{transform:translateY(0)}
100%{transform:translateY(-8px)}
}

/* 🌠 METEOR */
.meteor{
position:fixed;
width:2px;height:100px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:meteor 1s linear;
}
@keyframes meteor{
to{transform:translate(-500px,500px) rotate(45deg);opacity:0}
}

/* INTRO */
#intro{
position:fixed;
width:100%;height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
background:rgba(0,0,0,0.95);
}

/* BUTTON */
.btn{
padding:14px 35px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#9333ea,#ec4899);
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 25px #9333ea;
margin:10px;
transition:0.3s;
}
.btn:hover{
transform:scale(1.08);
box-shadow:0 0 45px #ec4899;
}

/* LOADING */
#loading{
display:none;
flex-direction:column;
align-items:center;
}

.percent{
font-size:40px;
margin:10px;
text-shadow:0 0 20px #9333ea;
}

.bar{
width:250px;height:6px;
background:#111;
border-radius:10px;
overflow:hidden;
}
.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#9333ea,#ec4899);
}

/* MAIN */
#main{
display:none;
padding:20px;
overflow:auto;
height:100vh;
background:#0b0014;
text-align:center;
}

/* PROFILE */
.logo{
width:140px;
height:140px;
border-radius:50%;
border:4px solid #00aaff;
box-shadow:0 0 30px #00aaff;
margin-bottom:10px;
}

.name{
font-size:26px;
font-weight:bold;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

.check{
background:#1d9bf0;
border-radius:50%;
padding:4px 7px;
font-size:14px;
}

/* SOCIAL */
.social{
margin:15px 0;
}

.btn-icon{
width:55px;height:55px;
border-radius:50%;
display:inline-flex;
justify-content:center;
align-items:center;
margin:8px;
animation:smoothFloat 2.5s ease-in-out infinite;
transition:0.3s;
}
@keyframes smoothFloat{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

.btn-icon:hover{
transform:scale(1.1);
}

.wa{background:#25D366;box-shadow:0 0 15px #25D366}
.tg{background:#0088cc;box-shadow:0 0 15px #0088cc}

.btn-icon img{width:28px}

/* TEXT */
.desc{
margin:10px 0 20px;
opacity:0.8;
}

/* GRID 2 KOLOM */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:10px;
}

/* CARD */
.card{
background:#140021;
border-radius:16px;
padding:18px;
text-decoration:none;
color:white;
box-shadow:0 0 15px #a100ff;
transition:0.3s;
text-align:center;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px #ff00ff;
}

.card h2{
font-size:16px;
}

/* RESPONSIVE */
@media(max-width:500px){
.container{
grid-template-columns:repeat(2,1fr);
}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgm" loop>
<source src="https://files.catbox.moe/3kq8s7.mp3">
</audio>

<!-- INTRO -->
<div id="intro">
<button class="btn" onclick="start()">🚀 Lanjutkan</button>

<div id="loading">
<div class="percent" id="percent">0%</div>
<div class="bar"><div class="fill" id="fill"></div></div>
<br>
<button class="btn" onclick="showMain()">⏭ Skip</button>
</div>
</div>

<!-- MAIN -->
<div id="main">

<h1 style="color:#ff00ff;text-shadow:0 0 15px #ff00ff;">WEBSITE JUALAN</h1>

<img class="logo" src="https://files.catbox.moe/t0cf7r.jpeg">

<div class="name">
RafaXMods <span class="check">✔</span>
</div>

<div class="social">
<a href="#"><div class="btn-icon wa">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</div></a>

<a href="#"><div class="btn-icon tg">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</div></a>
</div>

<p class="desc">Pilih layanan yang kamu butuhkan</p>

<div class="container">
<a href="list.html" class="card"><h2>🛒 List Jualan</h2></a>
<a href="music.html" class="card"><h2>🎧 Search Music</h2></a>
<a href="Spotify.html" class="card"><h2>🎵 Spotify Play</h2></a>
<a href="tiktok.html" class="card"><h2>🎵 Download TikTok</h2></a>
<a href="iqc.html" class="card"><h2>📸 Fake Iphone</h2></a>
<a href="pinterest-downloader.html" class="card"><h2>✨ Wallpaper</h2></a>
<a href="fakestory.html" class="card"><h2>💫 Fake Story</h2></a>
<a href="hdfoto.html" class="card"><h2>❄ HD Enhancer</h2></a>
<a href="Encscript.html" class="card"><h2>⚙️ Enc Script</h2></a>
</div>


<script>
// ⭐ STAR
for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

// 🌠 METEOR
setInterval(()=>{
let m=document.createElement("div");
m.className="meteor";
m.style.left=Math.random()*100+"vw";
m.style.top="0";
document.body.appendChild(m);
setTimeout(()=>m.remove(),1000);
},700);

// START
function start(){
document.querySelector(".btn").style.display="none";
document.getElementById("loading").style.display="flex";

document.getElementById("bgm").play().catch(()=>{});

let p=0;
let percent=document.getElementById("percent");
let fill=document.getElementById("fill");

let int=setInterval(()=>{
p+=Math.random()*6;

if(p>=100){
p=100;
clearInterval(int);
setTimeout(showMain,500);
}

percent.innerText=Math.floor(p)+"%";
fill.style.width=p+"%";

},100);
}

// SHOW MAIN
function showMain(){
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
document.body.style.overflow="auto";
}
</script>

</body>
</html>
