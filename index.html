/* ⭐ BINTANG */
.star{
position:fixed;
width:2px;height:2px;
background:white;
border-radius:50%;
opacity:0.7;
animation:floatStar 4s ease-in-out infinite alternate;
}
@keyframes floatStar{
0%{transform:translateY(0)}

}

/* 🌠 METEOR */
.meteor{
position:fixed;
width:2px;height:100px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:meteor 1s linear;

@keyframes meteor{
