<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORE RAFAXMODS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
background:#000;
color:white;
overflow:hidden;
}

/* ⭐ STAR */
.star{
position:fixed;
width:2px;height:2px;
background:white;
border-radius:50%;
opacity:0.7;
animation:floatStar 4s ease-in-out infinite alternate;
}

@keyframes floatStar{
0%{transform:translateY(0)}
100%{transform:translateY(-8px)}
}

/* 🌠 METEOR */
.meteor{
position:fixed;
width:2px;height:100px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:meteor 1s linear;
}

@keyframes meteor{
to{transform:translate(-500px,500px) rotate(45deg);opacity:0}
}

/* ===== GATE ===== */
#gate{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
}

.box{
background:#111;
padding:25px;
border-radius:15px;
text-align:center;
width:90%;
max-width:360px;
box-shadow:0 0 25px #25D366;
}

.btn{
padding:14px 25px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.join{background:#25D366;color:black}
.check{background:#00a2ff;color:white;display:none}
.enter{background:#ff00ff;color:white;display:none}

/* ===== LOADING ===== */
#loading{
display:none;
flex-direction:column;
align-items:center;
perspective:1000px;
}

.cube{
width:120px;
height:120px;
background:linear-gradient(45deg,#9333ea,#00c3ff,#ff00ff);
box-shadow:0 0 40px #9333ea;
animation:rotate3d 2s infinite linear;
border-radius:20px;
}

@keyframes rotate3d{
0%{transform:rotateY(0deg) rotateX(15deg)}
50%{transform:rotateY(180deg) rotateX(-15deg)}
100%{transform:rotateY(360deg) rotateX(15deg)}
}

/* ===== MAIN ===== */
#main{
display:none;
padding:20px;
overflow:auto;
height:100vh;
background:#0b0014;
text-align:center;
}

.logo{
width:140px;
height:140px;
border-radius:50%;
border:4px solid #00aaff;
box-shadow:0 0 30px #00aaff;
margin-bottom:10px;
}

.name{
font-size:26px;
font-weight:bold;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

.checkmark{
background:#1d9bf0;
border-radius:50%;
padding:4px 7px;
font-size:14px;
}

/* ===== MENU 2 LAPAK PREMIUM ===== */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
padding:18px;
margin-top:20px;
}

.card{
background:linear-gradient(145deg,#12001f,#1e0036);
border-radius:20px;
padding:22px 12px;
text-decoration:none;
color:white;
box-shadow:0 0 15px rgba(170,0,255,0.35);
transition:0.25s ease;
text-align:center;
border:1px solid rgba(255,255,255,0.06);
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:-60%;
left:-60%;
width:220%;
height:220%;
background:radial-gradient(circle,rgba(255,0,255,0.25),transparent 60%);
animation:glowMove 3s linear infinite;
}

@keyframes glowMove{
0%{transform:translateX(-20%) translateY(-20%) rotate(25deg);}
50%{transform:translateX(20%) translateY(20%) rotate(25deg);}
100%{transform:translateX(-20%) translateY(-20%) rotate(25deg);}
}

.card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 0 30px rgba(255,0,255,0.6);
border:1px solid rgba(255,0,255,0.4);
}

.card h2{
font-size:13px;
font-weight:700;
margin-top:10px;
}

/* MOBILE FIX */
@media(max-width:400px){
.container{
grid-template-columns:repeat(2,1fr);
gap:12px;
}
}

</style>
</head>

<body>

<!-- GATE -->
<div id="gate">
<div class="box">
<h3>⚠ Wajib Join Saluran WA</h3>
<p style="opacity:0.7;font-size:13px;">Klik lanjutkan lalu join</p>

<button class="btn join" onclick="warnJoin()">🚀 LANJUTKAN</button>

<a href="https://whatsapp.com/channel/0029Vb6SHOA0AgWEzwzBK41S" target="_blank">
<button class="btn check" id="joinBtn" onclick="showEnter()">📢 JOIN SALURAN WA</button>
</a>

<button class="btn enter" id="enterBtn" onclick="startSite()">
➡ MASUK WEBSITE
</button>

</div>

<div id="loading">
<div class="cube"></div>
<p style="margin-top:10px;">Loading Sultan Mode...</p>
</div>
</div>

<!-- MAIN -->
<div id="main">

<h1 style="color:#ff00ff;text-shadow:0 0 15px #ff00ff;">WEBSITE JUALAN</h1>

<img class="logo" src="https://files.catbox.moe/t0cf7r.jpeg">

<div class="name">
RafaXMods <span class="checkmark">✔</span>
</div>

<div class="container">

<a href="list.html" class="card"><h2>🛒 List Jualan</h2></a>

<a href="fakestory.html" class="card"><h2>💫 Fake Story</h2></a>
<a href="hdfoto.html" class="card"><h2>❄ HD Foto</h2></a>
<a href="Encscript.html" class="card"><h2>⚙️ Enc Script</h2></a>

</div>

</div>

<script>

// STAR
for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

// METEOR
setInterval(()=>{
let m=document.createElement("div");
m.className="meteor";
m.style.left=Math.random()*100+"vw";
m.style.top="0";
document.body.appendChild(m);
setTimeout(()=>m.remove(),1000);
},700);

// GATE
function warnJoin(){
alert("⚠ Silakan join saluran WhatsApp dulu!");
document.getElementById("joinBtn").style.display="inline-block";
}

function showEnter(){
document.getElementById("enterBtn").style.display="inline-block";
}

function startSite(){
document.getElementById("gate").style.display="none";
document.getElementById("main").style.display="none";
document.getElementById("loading").style.display="flex";

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("main").style.display="block";
document.body.style.overflow="auto";
},2500);
}

</script>

</body>
</html>
