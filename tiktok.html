<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#5b7cfa">
    <title>TikTok Downloader - RafaXMods</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=500;600;700;800&family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* RESET & BASE THEME */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        h1, h2, .brand-title, .tools-text h2, .label, .btn, .section-title, .notification {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #05060d;
            min-height: 100vh;
            color: #f4f6ff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(91, 124, 250, .28), transparent 60%),
                radial-gradient(ellipse 70% 45% at 15% 55%, rgba(60, 80, 200, .16), transparent 60%),
                radial-gradient(ellipse 70% 45% at 85% 90%, rgba(91, 124, 250, .20), transparent 60%);
            z-index: -1;
        }

        /* CONTAINER SETUP */
        .container {
            width: 100%;
            max-width: 430px;
            margin: auto;
            padding: 0 20px;
        }

        /* HEADER TOPBAR */
        header {
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 20px 25px; 
            padding-top: 40px; 
            padding-bottom: 20px; 
            background: #05060d;
            z-index: 50;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .back-btn {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: linear-gradient(145deg, #1a2044, #0e1230);
            border: 1px solid rgba(124, 147, 255, .35);
            box-shadow: 0 0 20px rgba(91, 124, 250, .25), inset 0 1px 0 rgba(255, 255, 255, .05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .3s;
            text-decoration: none;
            color: #f4f6ff;
            font-weight: bold;
            font-size: 18px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(124, 147, 255, .6);
            box-shadow: 0 0 25px rgba(91, 124, 250, .4);
        }

        .brand-title { 
            font-size: 20px; 
            font-weight: 700; 
            color: #fff;
            letter-spacing: .2px;
        }

        main { 
            flex: 1; 
            padding-bottom: 30px; 
            position: relative;
        }

        /* TOOLS HEADER STYLE */
        .tools-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 25px;
            margin-top: 20px;
        }
        
        .tools-title-group { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        
        .tools-logo { 
            width: 50px; 
            height: 50px; 
            background: linear-gradient(135deg, #5b7cfa, #324adf);
            border-radius: 14px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 0 20px rgba(91, 124, 250, .5);
        }
        
        .tools-text h2 { 
            font-size: 22px; 
            font-weight: 700; 
            color: #fff; 
            margin-bottom: 2px;
            background: linear-gradient(90deg, #5b7cfa, #a5b4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .tools-text p { 
            font-size: 12px; 
            color: #8b93b8; 
            font-weight: 400; 
        }
        
        .owner-badge {
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #8b93b8;
        }

        /* GLASS CARD STYLING */
        .input-card, .result-card {
            background: linear-gradient(160deg, #10142c, #0a0d1f);
            border: 1px solid rgba(255, 255, 255, .07);
            border-radius: 24px;
            padding: 24px 20px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04), 0 10px 30px rgba(0, 0, 0, .3);
            margin-bottom: 25px;
            position: relative;
        }

        .label, .section-title {
            display: block;
            text-align: left;
            font-size: 15px;
            font-weight: 600;
            color: #f4f6ff;
            margin-bottom: 10px;
        }
        
        .section-title {
            margin-top: 10px;
        }

        /* INPUT SYSTEM */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-field {
            width: 100%;
            height: 54px;
            background: #070a18;
            border: 1px solid rgba(124, 147, 255, .25);
            padding: 0 50px 0 18px;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: rgba(124, 147, 255, .6);
            box-shadow: 0 0 15px rgba(91, 124, 250, .2);
        }

        .input-field::placeholder {
            color: #525a7f;
        }

        .input-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #525a7f;
            font-size: 16px;
        }

        /* BUTTONS */
        .btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: .3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-process {
            background: linear-gradient(145deg, #5b7cfa, #324adf);
            box-shadow: 0 8px 24px rgba(91, 124, 250, .35);
        }

        .btn-process:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(91, 124, 250, .5);
        }

        .btn-process:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        /* LOADER */
        .loader-wrapper {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(91, 124, 250, .15);
            border-top: 4px solid #5b7cfa;
            border-radius: 50%;
            margin: auto;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(91, 124, 250, .2);
        }
        
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        
        .loader-text {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #8b93b8;
        }

        /* RESULT CARD STYLING */
        .result-card {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: none; }
        }

        .video-container {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #000;
            border: 1px solid rgba(124, 147, 255, .3);
            box-shadow: 0 0 30px rgba(91, 124, 250, .2);
        }
        
        .video-player {
            width: 100%;
            display: block;
            max-height: 400px;
        }

        .video-info {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .author-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
            color: #a5b4ff;
            font-size: 16px;
            font-weight: 600;
        }

        .video-caption {
            font-size: 13.5px;
            color: #8b93b8;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 15px;
            line-height: 1.6;
            padding: 0 10px;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            background: #070a18;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13.5px;
            color: #f4f6ff;
            font-weight: 500;
        }
        
        .stat-item i {
            color: #5b7cfa;
        }

        /* ACTION BUTTONS DOWNLOAD */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-download {
            background: linear-gradient(145deg, #1a2044, #0e1230);
            border: 1px solid rgba(124, 147, 255, .35);
            color: white;
            padding: 14px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.3s;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            border-color: rgba(124, 147, 255, .6);
            box-shadow: 0 0 15px rgba(91, 124, 250, .3);
        }

        .btn-download i {
            font-size: 18px;
            color: #5b7cfa;
        }

        /* RESET SYSTEM */
        .btn-reset {
            width: 100%;
            height: 50px;
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            border-radius: 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }
        
        .btn-reset:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }

        /* ERRORS */
        .error-toast {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 14px;
            border-radius: 14px;
            margin-top: 15px;
            text-align: center;
            font-size: 13.5px;
            display: none;
            font-weight: 500;
        }

        /* SYSTEM GLOBAL NOTIFICATION */
        .notification {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(160deg, #10142c, #0a0d1f);
            color: #fff;
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: 600;
            z-index: 9999;
            border: 1px solid rgba(124, 147, 255, 0.4);
            box-shadow: 0 10px 25px rgba(91, 124, 250, 0.3);
            animation: slideIn 0.3s ease-out;
            backdrop-filter: blur(10px);
            text-align: center;
            font-size: 14px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(-50%) translateY(0); opacity: 1; }
            to { transform: translateX(-50%) translateY(-20px); opacity: 0; }
        }

        /* CREDIT FOOTER */
        .credit {
            margin-top: 30px;
            padding: 20px 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, .07);
            font-size: 12.5px;
            font-weight: 500;
            color: #8b93b8;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <a href="index.html" class="back-btn">🔙</a>
        <div class="brand-title">RafaXMods Tools</div>
    </header>

    <main class="container">
        <!-- Tools Header -->
        <div class="tools-header">
            <div class="tools-title-group">
                <div class="tools-logo">
                    <i class="fab fa-tiktok" style="font-size: 24px; color: white;"></i>
                </div>
                <div class="tools-text">
                    <h2>TikTok Downloader</h2>
                    <p>Download TikTok Video & Audio</p>
                </div>
            </div>
            <div class="owner-badge" id="user-badge">RafaXMods</div>
        </div>

        <!-- Input Form -->
        <div class="section-title">PASTE TIKTOK URL</div>
        
        <div class="input-card">
            <div class="input-group">
                <input type="text" id="urlInput" class="input-field" placeholder="Paste TikTok URL here...">
                <i class="fas fa-link input-icon"></i>
            </div>
            <button id="processBtn" class="btn btn-process">
                <i class="fas fa-bolt"></i> EXECUTE DOWNLOAD
            </button>
            <div id="errorToast" class="error-toast"></div>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader-wrapper">
            <div class="spinner"></div>
            <div class="loader-text">FETCHING TIKTOK DATA...</div>
        </div>

        <!-- Result Card -->
        <div id="resultCard" class="result-card">
            <div class="video-container">
                <video id="videoPreview" class="video-player" controls autoplay loop muted></video>
            </div>

            <div class="video-info">
                <div class="author-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="authorName">@username</span>
                </div>
                <div class="video-caption" id="videoCaption">Video caption will appear here...</div>
                
                <div class="stats-row">
                    <div class="stat-item"><i class="fas fa-heart"></i> <span id="likeCount">0</span></div>
                    <div class="stat-item"><i class="fas fa-comment"></i> <span id="commentCount">0</span></div>
                    <div class="stat-item"><i class="fas fa-share"></i> <span id="shareCount">0</span></div>
                </div>
            </div>

            <div class="action-buttons">
                <a href="#" id="dlVideo" class="btn-download" target="_blank">
                    <i class="fas fa-video"></i>
                    <span>VIDEO NO WM</span>
                </a>
                <a href="#" id="dlAudio" class="btn-download" target="_blank">
                    <i class="fas fa-music"></i>
                    <span>AUDIO MP3</span>
                </a>
            </div>

            <button onclick="resetApp()" class="btn-reset">
                <i class="fas fa-trash"></i> RESET APPLICATION
            </button>
        </div>

        <!-- FOOTER CREDIT SYSTEM -->
        <div class="credit">
            Rafa Official • TikTok Downloader<br>
            © 2026 RafaXMods — Dukung kami dengan join Saluran WhatsApp & Telegram
        </div>
    </main>

    <!-- APPLICATIONS CODE LOGIC -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check user role (simplified version from dashboard)
            async function fetchUserData() {
                try {
                    const userRole = 'user'; // Default role
                    const badgeElement = document.getElementById('user-badge');
                    if (badgeElement) {
                        badgeElement.textContent = badgeElement.textContent.toUpperCase();
                    }
                    return { role: userRole };
                } catch (error) {
                    console.error('Error fetching user data:', error);
                    return { role: 'user' };
                }
            }

            await fetchUserData();

            // TikTok Downloader Logic
            const processBtn = document.getElementById('processBtn');
            const urlInput = document.getElementById('urlInput');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const errorToast = document.getElementById('errorToast');

            // Output Elements
            const videoPreview = document.getElementById('videoPreview');
            const authorName = document.getElementById('authorName');
            const videoCaption = document.getElementById('videoCaption');
            const likeCount = document.getElementById('likeCount');
            const commentCount = document.getElementById('commentCount');
            const shareCount = document.getElementById('shareCount');
            const dlVideo = document.getElementById('dlVideo');
            const dlAudio = document.getElementById('dlAudio');

            // Show notification function
            function showNotification(message) {
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.innerHTML = `🚀 ${message}`;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease-out';
                    setTimeout(() => {
                        if (notification.parentNode) {
                            document.body.removeChild(notification);
                        }
                    }, 300);
                }, 2000);
            }

            processBtn.addEventListener('click', async () => {
                const url = urlInput.value.trim();
                if (!url) {
                    showError("⚠️ Please enter a TikTok URL first!");
                    return;
                }

                // Validate TikTok URL
                if (!url.includes('tiktok.com') && !url.includes('vt.tiktok.com')) {
                    showError("❌ Please enter a valid TikTok URL!");
                    return;
                }

                // Reset UI
                errorToast.style.display = 'none';
                resultCard.style.display = 'none';
                loader.style.display = 'block';
                processBtn.disabled = true;
                processBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESSING...';
                videoPreview.pause();
                videoPreview.src = "";

                try {
                    // Using a public TikTok API (TikWM)
                    const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`;
                    
                    const response = await fetch(apiUrl);
                    const data = await response.json();

                    if (data.code === 0) {
                        // Success
                        const info = data.data;
                        
                        // Populate Data
                        authorName.textContent = '@' + info.author.unique_id;
                        videoCaption.textContent = info.title || "No caption";
                        likeCount.textContent = formatStats(info.digg_count || 0);
                        commentCount.textContent = formatStats(info.comment_count || 0);
                        shareCount.textContent = formatStats(info.share_count || 0);

                        // Set Sources
                        videoPreview.src = info.play; // URL video no watermark
                        dlVideo.href = info.play;
                        dlVideo.setAttribute('download', 'tiktok_video.mp4');
                        
                        // Audio source
                        dlAudio.href = info.music || '#';
                        dlAudio.setAttribute('download', 'tiktok_audio.mp3');

                        // Show Result
                        loader.style.display = 'none';
                        resultCard.style.display = 'block';
                        processBtn.disabled = false;
                        processBtn.innerHTML = '<i class="fas fa-bolt"></i> EXECUTE DOWNLOAD';
                        
                        // Auto play (muted)
                        videoPreview.play().catch(e => console.log("Autoplay blocked"));
                        
                        showNotification("TikTok video fetched successfully! ✅");

                    } else {
                        throw new Error("Video not found or private.");
                    }

                } catch (err) {
                    loader.style.display = 'none';
                    processBtn.disabled = false;
                    processBtn.innerHTML = '<i class="fas fa-bolt"></i> EXECUTE DOWNLOAD';
                    showError("❌ Failed to fetch data. Please check the URL.");
                    console.error(err);
                }
            });

            function formatStats(num) {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num;
            }

            function showError(msg) {
                errorToast.textContent = msg;
                errorToast.style.display = 'block';
                setTimeout(() => errorToast.style.display = 'none', 3000);
            }

            window.resetApp = function() {
                urlInput.value = '';
                resultCard.style.display = 'none';
                videoPreview.pause();
                videoPreview.src = "";
                urlInput.focus();
                showNotification("App reset successfully!");
            };

            // Enter key support
            urlInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    processBtn.click();
                }
            });
        });
    </script>
</body>
</html>
