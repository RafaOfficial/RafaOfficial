<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Lobby FF Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
    background:#000;
    color:white;
    overflow-x:hidden;
}

/* ⭐ STAR */
.star{
    position:fixed;
    width:2px;height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
    from{opacity:0.2}
    to{opacity:1}
}

/* ☄️ METEOR */
.meteor{
    position:fixed;
    width:3px;height:100px;
    background:linear-gradient(white,transparent);
    transform:rotate(45deg);
    animation:meteor 2s linear;
}
@keyframes meteor{
    0%{transform:translate(0,0) rotate(45deg);opacity:1}
    100%{transform:translate(-600px,600px) rotate(45deg);opacity:0}
}

/* BOX */
.box{
    margin:50px auto;
    width:90%;
    max-width:420px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    box-shadow:0 0 50px rgba(123,0,255,0.2);
    text-align:center;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    margin-top:10px;
}

/* 💜 BUTTON PREMIUM */
button{
width:100%;
padding:14px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#9333ea,#ff00ff);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* RESULT */
.result{
    margin-top:60px;
    text-align:center;
}

/* 🔥 IMAGE DIPERKECIL */
img{
    width:80%;          /* tidak full */
    max-width:300px;    /* batas maksimal */
    border-radius:12px;
    margin-top:15px;
    box-shadow:0 0 25px rgba(123,0,255,0.4);
}

/* LOADER */
.loader{
    margin-top:15px;
    width:40px;height:40px;
    border:4px solid #222;
    border-top:4px solid #7b00ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    display:none;
    margin:auto;
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* ERROR */
.error{color:red;margin-top:10px}

/* 🔙 BACK BUTTON (SUDAH DINAIKKAN) */
.back{
    position:fixed;
    top:8px;
    left:12px;
    width:auto;
    padding:10px 15px;
    font-size:12px;
    z-index:999;
}
</style>
</head>
<body>

<!-- 🔙 BACK -->
<button class="back" onclick="goBack()">⬅️ BACK</button>

<!-- FORM -->
<div class="box">
    <h2>🎮 Fake Lobby FF</h2>
    <input id="nick" placeholder="Masukkan nickname...">
    <button onclick="gen()">GENERATE</button>

    <div class="loader" id="loader"></div>
    <div class="error" id="error"></div>
</div>

<!-- RESULT -->
<div class="result" id="result"></div>

<script>
// ⭐ STARS
for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
}

// ☄️ METEOR
setInterval(()=>{
    let m=document.createElement("div");
    m.className="meteor";
    m.style.top=Math.random()*100+"vh";
    m.style.left=Math.random()*100+"vw";
    document.body.appendChild(m);
    setTimeout(()=>m.remove(),2000);
},800);

// BACK
function goBack(){
    window.location.href="index.html";
}

// 🔥 GENERATE + AUTO SCROLL
async function gen(){
    const nick=document.getElementById("nick").value.trim();
    const result=document.getElementById("result");
    const error=document.getElementById("error");
    const loader=document.getElementById("loader");

    result.innerHTML="";
    error.innerHTML="";

    if(!nick){
        error.innerHTML="⚠️ isi nickname dulu";
        return;
    }

    loader.style.display="block";

    let url=`https://api.nexray.web.id/maker/fakelobyff?nickname=${encodeURIComponent(nick)}`;

    try{
        let res=await fetch(url);
        if(!res.ok) throw new Error("API error / koneksi");

        result.innerHTML=`
            <h3>${nick}</h3>
            <img src="${url}">
            <br><br>
            <a href="${url}" download>
                <button>📥 DOWNLOAD IMAGE</button>
            </a>
        `;

        // 🔥 AUTO SCROLL KE HASIL (LEBIH HALUS & TEPAT)
        setTimeout(()=>{
            document.getElementById("result").scrollIntoView({
                behavior:"smooth"
            });
        },200);

    }catch(e){
        error.innerHTML="❌ "+e.message;
    }

    loader.style.display="none";
}
</script>

</body>
</html>
